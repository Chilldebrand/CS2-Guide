<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{TITLE}}</title>
    <link rel="stylesheet" href="{{ASSET_BASE}}styles.css">
    <script type="module" src="{{ASSET_BASE}}app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ASSET_BASE}}index.html">CS2 Guide</a>
      <nav aria-label="{{MAP_TITLE}} sections">
        <a href="#round-plan">Round plan</a>
        <a href="#offense">Offense</a>
        <a href="#defense">Defense</a>
        <a href="#utility-priorities">Utility</a>
      </nav>
      <a href="https://github.com/Chilldebrand/CS2-Guide/blob/main/maps/{{MAP_SLUG}}/README.md">Markdown source →</a>
    </header>
    <main class="guide-layout">
      <article id="guide-content">{{CONTENT}}</article>
      <aside class="map-panel" id="{{MAP_SLUG}}-map" data-map-panel>
        <div class="map-controls">
          <label><input type="checkbox" id="map-follow" data-map-follow checked> Map follows scroll</label>
          <button type="button" id="map-collapse" data-map-collapse
                  aria-controls="map-body" aria-expanded="true">Collapse map</button>
          <label for="map-size">Map size</label>
          <select id="map-size" data-map-size>
            <option value="1">1×</option>
            <option value="2">2×</option>
            <option value="3">3×</option>
            <option value="4">4×</option>
          </select>
        </div>
        <div id="map-body" data-map-body>
          <div class="map-side-tabs" role="tablist" aria-label="{{MAP_TITLE}} side view">
            <button type="button" class="map-side-tab" role="tab" aria-selected="true"
                    aria-controls="map-default-t" data-map-side-tab="t">T side</button>
            <button type="button" class="map-side-tab" role="tab" aria-selected="false"
                    aria-controls="map-default-ct" data-map-side-tab="ct">CT side</button>
          </div>
          <div class="default-grid role-default-grid" aria-label="{{MAP_TITLE}} five-player defaults">
            <figure id="map-default-t" class="default-card" data-map-default="t">
              <figcaption><strong>T default</strong> — routes and initial pressure</figcaption>
              <img data-map-side="t" src="{{MAP_ASSET_BASE}}default-t.svg"
                   alt="{{MAP_TITLE}} T-side five-player default showing roles, routes, and initial pressure">
            </figure>
            <figure id="map-default-ct" class="default-card" data-map-default="ct" hidden>
              <figcaption><strong>CT default</strong> — hold angles and first rotation</figcaption>
              <img data-map-side="ct" src="{{MAP_ASSET_BASE}}default-ct.svg"
                   alt="{{MAP_TITLE}} CT-side five-player default showing roles, hold angles, and rotation trigger">
            </figure>
          </div>
        </div>
      </aside>
    </main>
    <dialog id="map-overlay" data-map-overlay aria-label="Expanded {{MAP_TITLE}} map">
      <button type="button" data-map-overlay-close>Close expanded map</button>
      <div class="default-grid role-default-grid" aria-label="Expanded {{MAP_TITLE}} five-player defaults">
        <img data-map-default="t" src="{{MAP_ASSET_BASE}}default-t.svg"
             alt="Expanded {{MAP_TITLE}} T-side five-player default showing roles, routes, and initial pressure">
        <img data-map-default="ct" src="{{MAP_ASSET_BASE}}default-ct.svg" hidden
             alt="Expanded {{MAP_TITLE}} CT-side five-player default showing roles, hold angles, and rotation trigger">
      </div>
    </dialog>
  </body>
</html>
