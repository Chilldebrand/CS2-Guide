  <circle class="attacker" cx="820" cy="394" r="14"/><circle class="attacker" cx="674" cy="352" r="14"/><circle class="attacker" cx="526" cy="504" r="14"/><circle class="defender" cx="134" cy="166" r="13"/><circle class="defender" cx="134" cy="452" r="13"/><circle class="defender" cx="434" cy="198" r="13"/><circle class="defender" cx="434" cy="456" r="13"/>
  <text class="head" x="912" y="84">Teaching read</text><text class="small" x="912" y="118">Courtyard and Exterior</text><text class="small" x="912" y="142">Kennels lead to Dock and</text><text class="small" x="912" y="166">Playroom. Yard and Bark</text><text class="small" x="912" y="190">Barn lead to Pool.</text><text class="head" x="912" y="264">Legend</text><circle class="attacker" cx="930" cy="306" r="12"/><text class="legend" x="958" y="312">Attacker / escort</text><circle class="defender" cx="930" cy="350" r="12"/><text class="legend" x="958" y="356">Defender / delay</text><circle class="hostage" cx="930" cy="398" r="12"/><text class="legend" x="958" y="404">Hostage room</text><line class="access" x1="916" y1="450" x2="948" y2="450"/><text class="legend" x="958" y="456">Access route</text><line class="rescue" x1="916" y1="498" x2="948" y2="498"/><text class="legend" x="958" y="504">Safe exit</text><text class="head" x="912" y="566">Round rule</text><text class="small" x="912" y="600">Clear the return corridor.</text><text class="small" x="912" y="624">Forward rifle first;</text><text class="small" x="912" y="648">second escort stays close.</text>
</svg>
