<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Shelter hostage-rescue positioning teaching diagram</title>
  <desc id="desc">A schematic Shelter objective diagram showing Playroom access through Cat Adoptions, Breezeway, Courtyard, Exterior Kennels, and Dock; Pool access through Cat Adoptions, Breezeway, Yard, and Bark Barn; defender room isolation; and safe exits to the rescue zone. Route relationships are based on the cited current callout guide; shapes are not to scale.</desc>
  <defs><style>.bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.route{fill:#374151;stroke:#cbd5e1;stroke-width:2.5}.room{fill:#4b5563;stroke:#e5e7eb;stroke-width:3}.label{fill:#f8fafc;font:700 14px Arial,sans-serif}.small{fill:#cbd5e1;font:14px Arial,sans-serif}.head{fill:#f8fafc;font:700 22px Arial,sans-serif}.attacker{fill:#22c55e;stroke:#dcfce7;stroke-width:3}.defender{fill:#f97316;stroke:#ffedd5;stroke-width:3}.hostage{fill:#facc15;stroke:#fef3c7;stroke-width:3}.access{fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round;marker-end:url(#a)}.rescue{fill:none;stroke:#22d3ee;stroke-width:6;stroke-dasharray:12 8;marker-end:url(#r)}.delay{fill:none;stroke:#f97316;stroke-width:4;stroke-dasharray:9 7;marker-end:url(#d)}.legend{fill:#f8fafc;font:16px Arial,sans-serif}</style><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fff"/></marker><marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#22d3ee"/></marker><marker id="d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#f97316"/></marker></defs>
  <rect class="bg" width="1180" height="760"/><rect class="panel" x="36" y="36" width="824" height="688" rx="18"/><rect class="panel" x="884" y="36" width="268" height="688" rx="18"/><text class="head" x="68" y="82">SHELTER · HOSTAGE-RESCUE SCHEMATIC</text><text class="small" x="68" y="108">Current callout route order; teaching layout, not to scale</text>
  <rect class="route" x="692" y="320" width="142" height="88" rx="12"/><text class="label" x="710" y="352">ATTACKER START</text><text class="small" x="716" y="380">RESCUE ZONE</text><rect class="route" x="548" y="320" width="118" height="64" rx="10"/><text class="label" x="564" y="358">Cat Adoptions</text><rect class="route" x="426" y="448" width="108" height="64" rx="10"/><text class="label" x="444" y="486">Breezeway</text><rect class="route" x="426" y="190" width="108" height="64" rx="10"/><text class="label" x="444" y="228">Courtyard</text><rect class="route" x="274" y="188" width="128" height="68" rx="10"/><text class="label" x="286" y="218">Exterior</text><text class="small" x="298" y="242">Kennels</text><rect class="route" x="164" y="188" width="88" height="64" rx="10"/><text class="label" x="190" y="226">Dock</text><rect class="room" x="60" y="158" width="88" height="112" rx="14"/><text class="label" x="72" y="194">PLAYROOM</text><text class="small" x="70" y="218">HOSTAGE</text><text class="small" x="82" y="238">ROOM</text><circle class="hostage" cx="124" cy="252" r="13"/>
  <rect class="route" x="306" y="536" width="96" height="64" rx="10"/><text class="label" x="332" y="574">Yard</text><rect class="route" x="164" y="472" width="118" height="64" rx="10"/><text class="label" x="180" y="510">Bark Barn</text><rect class="room" x="60" y="448" width="88" height="112" rx="14"/><text class="label" x="84" y="482">POOL</text><text class="small" x="70" y="506">HOSTAGE</text><text class="small" x="82" y="526">ROOM</text><circle class="hostage" cx="124" cy="544" r="13"/>
