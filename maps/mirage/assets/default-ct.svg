<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Mirage ct default sourced-map overlay</title>
  <desc id="desc">Mirage ct default teaching overlay. Contest Mid with support, keep A Ramp reaction available, and preserve a Jungle/Connector route for the first rotate. Five players: A anchor: hold Ramp / site; B anchor: hold Apps / Market; Mid contest: Window with support; Connector: watch split / Jungle; Rotator: Market or A retake path. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#bfdbfe"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Fmirage-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Mirage · CT DEFAULT</text>
  <text class="header-rule" x="48" y="83">Contest Mid with support, keep A Ramp reaction available, and preserve a Jungle/Connector route for the first rotate.</text>
  <ellipse class="zone" cx="500" cy="360" rx="92" ry="50"/><text class="zone-label" x="375" y="265">Window / Connector</text><ellipse class="zone" cx="800" cy="500" rx="86" ry="48"/><text class="zone-label" x="730" y="600">B anchor</text>
  <path class="hold ct-hold" d="M 920 190 C 855 168, 855 232, 790 210"/><path class="hold ct-hold" d="M 920 540 C 860 518, 860 522, 800 500"/><path class="hold ct-hold" d="M 500 360 C 475 338, 475 337, 450 315"/><path class="hold ct-hold" d="M 650 300 C 635 278, 635 262, 620 240"/><path class="hold ct-hold" d="M 700 620 C 730 598, 730 462, 760 440"/>
  <g data-side="ct" data-player="1" data-role="A anchor" data-action="hold Ramp / site" aria-label="Player 1, A anchor">
    <circle class="marker ct-marker" cx="920" cy="190" r="18"/>
    <text class="marker-number" x="920" y="196">1</text>
    <line class="leader" x1="920" y1="190" x2="900" y2="153"/>
    <rect class="label-box" x="900" y="135" width="190" height="54" rx="8"/>
    <text class="player-role" x="912" y="156">1 · A anchor</text>
    <text class="player-action" x="912" y="176">hold Ramp / site</text>
  </g><g data-side="ct" data-player="2" data-role="B anchor" data-action="hold Apps / Market" aria-label="Player 2, B anchor">
    <circle class="marker ct-marker" cx="920" cy="540" r="18"/>
    <text class="marker-number" x="920" y="546">2</text>
    <line class="leader" x1="920" y1="540" x2="900" y2="618"/>
    <rect class="label-box" x="900" y="600" width="190" height="54" rx="8"/>
    <text class="player-role" x="912" y="621">2 · B anchor</text>
    <text class="player-action" x="912" y="641">hold Apps / Market</text>
  </g><g data-side="ct" data-player="3" data-role="Mid contest" data-action="Window with support" aria-label="Player 3, Mid contest">
    <circle class="marker ct-marker" cx="500" cy="360" r="18"/>
    <text class="marker-number" x="500" y="366">3</text>
    <line class="leader" x1="500" y1="360" x2="350" y2="268"/>
    <rect class="label-box" x="350" y="250" width="190" height="54" rx="8"/>
    <text class="player-role" x="362" y="271">3 · Mid contest</text>
    <text class="player-action" x="362" y="291">Window with support</text>
  </g><g data-side="ct" data-player="4" data-role="Connector" data-action="watch split / Jungle" aria-label="Player 4, Connector">
    <circle class="marker ct-marker" cx="650" cy="300" r="18"/>
    <text class="marker-number" x="650" y="306">4</text>
    <line class="leader" x1="650" y1="300" x2="660" y2="208"/>
    <rect class="label-box" x="660" y="190" width="190" height="54" rx="8"/>
    <text class="player-role" x="672" y="211">4 · Connector</text>
    <text class="player-action" x="672" y="231">watch split / Jungle</text>
  </g><g data-side="ct" data-player="5" data-role="Rotator" data-action="Market or A retake path" aria-label="Player 5, Rotator">
    <circle class="marker ct-marker" cx="700" cy="620" r="18"/>
    <text class="marker-number" x="700" y="626">5</text>
    <line class="leader" x1="700" y1="620" x2="650" y2="698"/>
    <rect class="label-box" x="650" y="680" width="190" height="54" rx="8"/>
    <text class="player-role" x="662" y="701">5 · Rotator</text>
    <text class="player-action" x="662" y="721">Market or A retake path</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="ct-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">CT player / hold point</text>
    <line class="hold ct-hold" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">angle / lane to hold</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/mirage · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
