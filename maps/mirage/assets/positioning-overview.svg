  <text class="label" x="118" y="630">T Spawn</text><text class="label" x="262" y="540">Top Mid</text><text class="label" x="402" y="426">Window</text><text class="label" x="528" y="326">Connector</text><text class="label" x="650" y="186">A SITE</text><text class="label" x="214" y="436">A Ramp</text><text class="label" x="354" y="192">Palace</text><text class="label" x="350" y="646">B Apps</text><text class="label" x="629" y="596">Cat</text><text class="label" x="720" y="511">B SITE</text><text class="label" x="700" y="326">Jungle</text><text class="label" x="744" y="426">Market</text>
  <text class="head" x="912" y="84">Teaching read</text><text class="small" x="912" y="118">Top Mid branches separately</text><text class="small" x="912" y="142">to Window, Connector, or Cat.</text><text class="small" x="912" y="166">Ramp and Palace reach A;</text><text class="small" x="912" y="190">Apps and Cat reach B on</text><text class="small" x="912" y="214">independent approaches.</text><text class="head" x="912" y="264">Legend</text><circle class="ct" cx="930" cy="306" r="12"/><text class="legend" x="958" y="312">CT hold / support</text><circle class="t" cx="930" cy="350" r="12"/><text class="legend" x="958" y="356">T pressure point</text><rect class="zone" x="916" y="386" width="28" height="22" rx="6"/><text class="legend" x="958" y="403">Decision zone</text><line class="arrow" x1="916" y1="446" x2="948" y2="446"/><text class="legend" x="958" y="452">T trade route</text><line class="ctroute" x1="916" y1="486" x2="948" y2="486"/><text class="legend" x="958" y="492">CT rotation</text><text class="head" x="912" y="526">Round rule</text><text class="small" x="912" y="560">Turn Mid control into a</text><text class="small" x="912" y="584">timed split. If Mid is</text><text class="small" x="912" y="608">denied, regroup before the</text><text class="small" x="912" y="632">site players commit.</text>
</svg>
