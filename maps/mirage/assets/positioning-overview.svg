  <path class="link" data-edge="t-spawn-to-top-mid" d="M150 625 300 535"/><path class="link" data-edge="top-mid-to-window" d="M300 535 430 420"/><path class="link" data-edge="top-mid-to-connector" d="M300 535 C388 470 480 388 560 320"/><path class="link" data-edge="connector-to-a" d="M560 320 690 180"/><path class="link" data-edge="a-ramp-to-a" d="M150 625 250 430 C382 342 524 238 690 180"/><path class="link" data-edge="palace-to-a" d="M150 625 C172 432 242 270 390 190 L690 180"/><path class="link" data-edge="b-apps-to-b" d="M150 625 390 640 C560 700 730 668 760 505"/><path class="link" data-edge="top-mid-to-cat" d="M300 535 600 590"/><path class="link" data-edge="cat-to-b" d="M600 590 760 505"/><path class="ctroute" data-edge="ct-site-rotation" d="M690 180 725 320 778 420 760 505"/>
