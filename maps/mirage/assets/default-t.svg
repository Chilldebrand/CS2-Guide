<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Mirage t default sourced-map overlay</title>
  <desc id="desc">Mirage t default teaching overlay. Two players claim Mid while A Ramp/Palace and B Apartments stay active; turn Mid control into a timed split. Five players: Mid entry: Top Mid → Window; Mid support: Connector / Cat branch; A Ramp / Palace: join the split; B Apartments: Apps → B; Bomb / flex: follow the first gap. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#fecaca"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Fmirage-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Mirage · T DEFAULT</text>
  <text class="header-rule" x="48" y="83">Two players claim Mid while A Ramp/Palace and B Apartments stay active; turn Mid control into a timed split.</text>
  <ellipse class="zone" cx="470" cy="360" rx="92" ry="50"/><text class="zone-label" x="375" y="265">Mid control</text><ellipse class="zone" cx="720" cy="210" rx="92" ry="48"/><text class="zone-label" x="620" y="130">A split pressure</text>
  <path class="route t-route" d="M 180 500 C 320 478, 320 382, 460 360"/><path class="route t-route" d="M 250 555 C 405 533, 405 367, 560 345"/><path class="route t-route" d="M 200 200 C 460 178, 460 232, 720 210"/><path class="route t-route" d="M 180 660 C 490 638, 490 522, 800 500"/><path class="route t-route" d="M 120 700 C 370 678, 370 452, 620 430"/>
  <g data-side="t" data-player="1" data-role="Mid entry" data-action="Top Mid → Window" aria-label="Player 1, Mid entry">
    <circle class="marker t-marker" cx="180" cy="500" r="18"/>
    <text class="marker-number" x="180" y="506">1</text>
    <line class="leader" x1="180" y1="500" x2="65" y2="468"/>
    <rect class="label-box" x="65" y="450" width="190" height="54" rx="8"/>
    <text class="player-role" x="77" y="471">1 · Mid entry</text>
    <text class="player-action" x="77" y="491">Top Mid → Window</text>
  </g><g data-side="t" data-player="2" data-role="Mid support" data-action="Connector / Cat branch" aria-label="Player 2, Mid support">
    <circle class="marker t-marker" cx="250" cy="555" r="18"/>
    <text class="marker-number" x="250" y="561">2</text>
    <line class="leader" x1="250" y1="555" x2="230" y2="618"/>
    <rect class="label-box" x="230" y="600" width="190" height="54" rx="8"/>
    <text class="player-role" x="242" y="621">2 · Mid support</text>
    <text class="player-action" x="242" y="641">Connector / Cat branch</text>
  </g><g data-side="t" data-player="3" data-role="A Ramp / Palace" data-action="join the split" aria-label="Player 3, A Ramp / Palace">
    <circle class="marker t-marker" cx="200" cy="200" r="18"/>
    <text class="marker-number" x="200" y="206">3</text>
    <line class="leader" x1="200" y1="200" x2="65" y2="163"/>
    <rect class="label-box" x="65" y="145" width="190" height="54" rx="8"/>
    <text class="player-role" x="77" y="166">3 · A Ramp / Palace</text>
    <text class="player-action" x="77" y="186">join the split</text>
  </g><g data-side="t" data-player="4" data-role="B Apartments" data-action="Apps → B" aria-label="Player 4, B Apartments">
    <circle class="marker t-marker" cx="180" cy="660" r="18"/>
    <text class="marker-number" x="180" y="666">4</text>
    <line class="leader" x1="180" y1="660" x2="45" y2="698"/>
    <rect class="label-box" x="45" y="680" width="190" height="54" rx="8"/>
    <text class="player-role" x="57" y="701">4 · B Apartments</text>
    <text class="player-action" x="57" y="721">Apps → B</text>
  </g><g data-side="t" data-player="5" data-role="Bomb / flex" data-action="follow the first gap" aria-label="Player 5, Bomb / flex">
    <circle class="marker t-marker" cx="120" cy="600" r="18"/>
    <text class="marker-number" x="120" y="606">5</text>
    <line class="leader" x1="120" y1="600" x2="45" y2="593"/>
    <rect class="label-box" x="45" y="575" width="190" height="54" rx="8"/>
    <text class="player-role" x="57" y="596">5 · Bomb / flex</text>
    <text class="player-action" x="57" y="616">follow the first gap</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="t-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">T player / route start</text>
    <line class="route t-route" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">route to first pressure</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/mirage · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
