<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Cache t default sourced-map overlay</title>
  <desc id="desc">Cache t default teaching overlay. Show three lanes early: A Main, B Main, and Mid. Take Mid with support so Highway or Vent can split the weaker site. Five players: A Main entry: A Main → Forklift; B Main entry: B Main → Checkers; Mid pressure: Garage → Mid; Highway / Vent: split after Mid; Bomb / flex: join the better read. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#fecaca"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Fcache-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Cache · T DEFAULT</text>
  <text class="header-rule" x="48" y="83">Show three lanes early: A Main, B Main, and Mid. Take Mid with support so Highway or Vent can split the weaker site.</text>
  <ellipse class="zone" cx="570" cy="360" rx="96" ry="52"/><text class="zone-label" x="455" y="270">Mid / Highway read</text><ellipse class="zone" cx="800" cy="520" rx="82" ry="48"/><text class="zone-label" x="730" y="605">B Main pressure</text>
  <path class="route t-route" d="M 170 250 C 312.5 228, 312.5 257, 455 235"/><path class="route t-route" d="M 170 565 C 320 543, 320 567, 470 545"/><path class="route t-route" d="M 320 410 C 440 388, 440 382, 560 360"/><path class="route t-route" d="M 450 470 C 585 448, 585 352, 720 330"/><path class="route t-route" d="M 120 680 C 365 658, 365 462, 610 440"/>
  <g data-side="t" data-player="1" data-role="A Main entry" data-action="A Main → Forklift" aria-label="Player 1, A Main entry">
    <circle class="marker t-marker" cx="170" cy="250" r="18"/>
    <text class="marker-number" x="170" y="256">1</text>
    <line class="leader" x1="170" y1="250" x2="45" y2="208"/>
    <rect class="label-box" x="45" y="190" width="190" height="54" rx="8"/>
    <text class="player-role" x="57" y="211">1 · A Main entry</text>
    <text class="player-action" x="57" y="231">A Main → Forklift</text>
  </g><g data-side="t" data-player="2" data-role="B Main entry" data-action="B Main → Checkers" aria-label="Player 2, B Main entry">
    <circle class="marker t-marker" cx="170" cy="565" r="18"/>
    <text class="marker-number" x="170" y="571">2</text>
    <line class="leader" x1="170" y1="565" x2="45" y2="618"/>
    <rect class="label-box" x="45" y="600" width="190" height="54" rx="8"/>
    <text class="player-role" x="57" y="621">2 · B Main entry</text>
    <text class="player-action" x="57" y="641">B Main → Checkers</text>
  </g><g data-side="t" data-player="3" data-role="Mid pressure" data-action="Garage → Mid" aria-label="Player 3, Mid pressure">
    <circle class="marker t-marker" cx="320" cy="410" r="18"/>
    <text class="marker-number" x="320" y="416">3</text>
    <line class="leader" x1="320" y1="410" x2="280" y2="473"/>
    <rect class="label-box" x="280" y="455" width="190" height="54" rx="8"/>
    <text class="player-role" x="292" y="476">3 · Mid pressure</text>
    <text class="player-action" x="292" y="496">Garage → Mid</text>
  </g><g data-side="t" data-player="4" data-role="Highway / Vent" data-action="split after Mid" aria-label="Player 4, Highway / Vent">
    <circle class="marker t-marker" cx="450" cy="470" r="18"/>
    <text class="marker-number" x="450" y="476">4</text>
    <line class="leader" x1="450" y1="470" x2="420" y2="523"/>
    <rect class="label-box" x="420" y="505" width="190" height="54" rx="8"/>
    <text class="player-role" x="432" y="526">4 · Highway / Vent</text>
    <text class="player-action" x="432" y="546">split after Mid</text>
  </g><g data-side="t" data-player="5" data-role="Bomb / flex" data-action="join the better read" aria-label="Player 5, Bomb / flex">
    <circle class="marker t-marker" cx="120" cy="680" r="18"/>
    <text class="marker-number" x="120" y="686">5</text>
    <line class="leader" x1="120" y1="680" x2="45" y2="698"/>
    <rect class="label-box" x="45" y="680" width="190" height="54" rx="8"/>
    <text class="player-role" x="57" y="701">5 · Bomb / flex</text>
    <text class="player-action" x="57" y="721">join the better read</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="t-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">T player / route start</text>
    <line class="route t-route" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">route to first pressure</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/cache · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
