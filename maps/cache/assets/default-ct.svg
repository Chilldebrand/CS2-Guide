<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Cache ct default sourced-map overlay</title>
  <desc id="desc">Cache ct default teaching overlay. Mid is the hinge: fight it with support, keep one A Main watcher, and use Vent/Connector information before rotating. Five players: A anchor: hold A Main / Truck; Mid support: fight Mid with help; B anchor: hold B Main / Headshot; Vent info: watch Connector / Vent; Rotator: Highway or Checkers help. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#bfdbfe"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Fcache-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Cache · CT DEFAULT</text>
  <text class="header-rule" x="48" y="83">Mid is the hinge: fight it with support, keep one A Main watcher, and use Vent/Connector information before rotating.</text>
  <ellipse class="zone" cx="590" cy="360" rx="92" ry="50"/><text class="zone-label" x="490" y="270">Mid contest</text><ellipse class="zone" cx="850" cy="245" rx="82" ry="46"/><text class="zone-label" x="780" y="155">A Main hold</text>
  <path class="hold ct-hold" d="M 910 220 C 850 198, 850 262, 790 240"/><path class="hold ct-hold" d="M 620 350 C 575 328, 575 382, 530 360"/><path class="hold ct-hold" d="M 900 555 C 840 533, 840 562, 780 540"/><path class="hold ct-hold" d="M 690 475 C 650 453, 650 432, 610 410"/><path class="hold ct-hold" d="M 620 620 C 690 598, 690 492, 760 470"/>
  <g data-side="ct" data-player="1" data-role="A anchor" data-action="hold A Main / Truck" aria-label="Player 1, A anchor">
    <circle class="marker ct-marker" cx="910" cy="220" r="18"/>
    <text class="marker-number" x="910" y="226">1</text>
    <line class="leader" x1="910" y1="220" x2="910" y2="173"/>
    <rect class="label-box" x="910" y="155" width="190" height="54" rx="8"/>
    <text class="player-role" x="922" y="176">1 · A anchor</text>
    <text class="player-action" x="922" y="196">hold A Main / Truck</text>
  </g><g data-side="ct" data-player="2" data-role="Mid support" data-action="fight Mid with help" aria-label="Player 2, Mid support">
    <circle class="marker ct-marker" cx="620" cy="350" r="18"/>
    <text class="marker-number" x="620" y="356">2</text>
    <line class="leader" x1="620" y1="350" x2="620" y2="288"/>
    <rect class="label-box" x="620" y="270" width="190" height="54" rx="8"/>
    <text class="player-role" x="632" y="291">2 · Mid support</text>
    <text class="player-action" x="632" y="311">fight Mid with help</text>
  </g><g data-side="ct" data-player="3" data-role="B anchor" data-action="hold B Main / Headshot" aria-label="Player 3, B anchor">
    <circle class="marker ct-marker" cx="900" cy="555" r="18"/>
    <text class="marker-number" x="900" y="561">3</text>
    <line class="leader" x1="900" y1="555" x2="890" y2="618"/>
    <rect class="label-box" x="890" y="600" width="190" height="54" rx="8"/>
    <text class="player-role" x="902" y="621">3 · B anchor</text>
    <text class="player-action" x="902" y="641">hold B Main / Headshot</text>
  </g><g data-side="ct" data-player="4" data-role="Vent info" data-action="watch Connector / Vent" aria-label="Player 4, Vent info">
    <circle class="marker ct-marker" cx="690" cy="475" r="18"/>
    <text class="marker-number" x="690" y="481">4</text>
    <line class="leader" x1="690" y1="475" x2="700" y2="448"/>
    <rect class="label-box" x="700" y="430" width="190" height="54" rx="8"/>
    <text class="player-role" x="712" y="451">4 · Vent info</text>
    <text class="player-action" x="712" y="471">watch Connector / Vent</text>
  </g><g data-side="ct" data-player="5" data-role="Rotator" data-action="Highway or Checkers help" aria-label="Player 5, Rotator">
    <circle class="marker ct-marker" cx="620" cy="620" r="18"/>
    <text class="marker-number" x="620" y="626">5</text>
    <line class="leader" x1="620" y1="620" x2="520" y2="668"/>
    <rect class="label-box" x="520" y="650" width="190" height="54" rx="8"/>
    <text class="player-role" x="532" y="671">5 · Rotator</text>
    <text class="player-action" x="532" y="691">Highway or Checkers help</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="ct-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">CT player / hold point</text>
    <line class="hold ct-hold" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">angle / lane to hold</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/cache · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
