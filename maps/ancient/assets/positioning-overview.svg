  <rect class="route" x="95" y="585" width="130" height="64" rx="10"/><text class="label" x="125" y="623">T Spawn</text>
  <rect class="route" x="236" y="505" width="128" height="64" rx="10"/><text class="label" x="265" y="543">Top Mid</text>
  <rect class="route" x="370" y="398" width="120" height="64" rx="10"/><text class="label" x="410" y="436">Mid</text>
  <rect class="route" x="505" y="298" width="112" height="64" rx="10"/><text class="label" x="532" y="336">Donut</text>
  <rect class="site" x="654" y="184" width="110" height="72" rx="12"/><text class="label" x="666" y="206">A SITE</text>
  <rect class="route" x="196" y="438" width="108" height="64" rx="10"/><text class="label" x="216" y="476">A Main</text>
  <rect class="route" x="326" y="145" width="128" height="64" rx="10"/><text class="label" x="355" y="183">Temple</text>
  <rect class="route" x="326" y="578" width="128" height="64" rx="10"/><text class="label" x="347" y="616">B Lobby</text>
  <rect class="route" x="558" y="538" width="124" height="64" rx="10"/><text class="label" x="585" y="576">B Ramp</text>
  <rect class="site" x="706" y="464" width="110" height="72" rx="12"/><text class="label" x="718" y="486">B SITE</text>
  <rect class="route" x="712" y="145" width="140" height="64" rx="10"/><text class="label" x="724" y="183">CT Spawn</text>
  <ellipse class="zone" cx="444" cy="430" rx="90" ry="58"/><ellipse class="zone" cx="568" cy="330" rx="74" ry="48"/>
  <path class="arrow" d="M185 605 C260 560 340 500 414 448"/><path class="arrow" d="M454 412 C500 380 526 354 548 338"/><path class="arrow" d="M594 316 C642 282 672 250 696 232"/><path class="arrow" d="M182 594 C224 552 238 520 248 484"/><path class="arrow" data-edge="a-main-to-a-site" d="M282 454 C382 356 520 278 642 232"/><path class="arrow" d="M216 610 C350 626 540 608 730 520"/>
