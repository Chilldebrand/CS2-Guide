<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Ancient positioning route teaching diagram</title>
  <desc id="desc">A schematic Ancient route diagram showing T pressure through Mid and Donut, a direct A Main approach to A Site, B Lobby spacing, and a separate blue dashed CT rotation between CT Spawn, Temple, and A Site. Route order is verified against the cited overview; shapes are not to scale.</desc>
  <defs>
    <style>.bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.route{fill:#374151;stroke:#cbd5e1;stroke-width:2.5}.site{fill:#4b5563;stroke:#e5e7eb;stroke-width:3}.label{fill:#f8fafc;font:700 17px Arial,sans-serif}.small{fill:#cbd5e1;font:15px Arial,sans-serif}.head{fill:#f8fafc;font:700 22px Arial,sans-serif}.ct{fill:#3b82f6;stroke:#dbeafe;stroke-width:3}.t{fill:#ef4444;stroke:#fee2e2;stroke-width:3}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3}.arrow{fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#a)}.link{fill:none;stroke:#64748b;stroke-width:12;stroke-linecap:round}.ctroute{fill:none;stroke:#60a5fa;stroke-width:5;stroke-dasharray:10 8;stroke-linecap:round}.legend{fill:#f8fafc;font:16px Arial,sans-serif}</style>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fff"/></marker>
  </defs>
  <rect class="bg" width="1180" height="760"/><rect class="panel" x="36" y="36" width="824" height="688" rx="18"/><rect class="panel" x="884" y="36" width="268" height="688" rx="18"/>
