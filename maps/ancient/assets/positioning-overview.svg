  <text class="label" x="355" y="183">Temple</text><text class="label" x="666" y="206">A SITE</text><text class="label" x="718" y="486">B SITE</text>
  <text class="head" x="912" y="84">Teaching read</text><text class="small" x="912" y="118">Mid pressure threatens</text><text class="small" x="912" y="142">Donut and A. A Main reaches</text><text class="small" x="912" y="166">A directly; Temple remains</text><text class="small" x="912" y="190">a separate CT-side hold.</text>
  <text class="head" x="912" y="264">Legend</text><circle class="ct" cx="930" cy="306" r="12"/><text class="legend" x="958" y="312">CT hold / support</text><circle class="t" cx="930" cy="350" r="12"/><text class="legend" x="958" y="356">T pressure point</text><rect class="zone" x="916" y="386" width="28" height="22" rx="6"/><text class="legend" x="958" y="403">Decision zone</text><line class="arrow" x1="916" y1="446" x2="948" y2="446"/><text class="legend" x="958" y="452">T trade route</text><line class="ctroute" x1="916" y1="486" x2="948" y2="486"/><text class="legend" x="958" y="492">CT rotation / hold</text>
  <text class="head" x="912" y="526">Round rule</text><text class="small" x="912" y="560">Convert verified Mid info;</text><text class="small" x="912" y="584">do not feed the first lane.</text><text class="small" x="912" y="620">Regroup with the bomb if</text><text class="small" x="912" y="644">the route is denied.</text>
