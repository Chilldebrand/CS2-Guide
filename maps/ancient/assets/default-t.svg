<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Ancient t default sourced-map overlay</title>
  <desc id="desc">Ancient t default teaching overlay. Pressure Mid and A Main together; keep B Lobby ready so the first denial becomes a reset, not a solo feed. Five players: A Main entry: A Main → site; Mid pressure: Top Mid → Donut; B Lobby entry: B Lobby → Ramp; Support / flash: follow the first contact; Bomb / flex: hold the A or B pivot. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#fecaca"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Fancient-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Ancient · T DEFAULT</text>
  <text class="header-rule" x="48" y="83">Pressure Mid and A Main together; keep B Lobby ready so the first denial becomes a reset, not a solo feed.</text>
  <ellipse class="zone" cx="520" cy="330" rx="90" ry="52"/><text class="zone-label" x="430" y="250">Mid / Donut pressure</text><ellipse class="zone" cx="350" cy="575" rx="74" ry="44"/><text class="zone-label" x="290" y="650">B Ramp threat</text>
  <path class="route t-route" d="M 200 300 C 305 278, 305 272, 410 250"/><path class="route t-route" d="M 300 430 C 410 408, 410 362, 520 340"/><path class="route t-route" d="M 170 590 C 260 568, 260 592, 350 570"/><path class="route t-route" d="M 260 650 C 390 628, 390 452, 520 430"/><path class="route t-route" d="M 120 700 C 385 678, 385 452, 650 430"/>
  <g data-side="t" data-player="1" data-role="A Main entry" data-action="A Main → site" aria-label="Player 1, A Main entry">
    <circle class="marker t-marker" cx="200" cy="300" r="18"/>
    <text class="marker-number" x="200" y="306">1</text>
    <line class="leader" x1="200" y1="300" x2="70" y2="268"/>
    <rect class="label-box" x="70" y="250" width="190" height="54" rx="8"/>
    <text class="player-role" x="82" y="271">1 · A Main entry</text>
    <text class="player-action" x="82" y="291">A Main → site</text>
  </g><g data-side="t" data-player="2" data-role="Mid pressure" data-action="Top Mid → Donut" aria-label="Player 2, Mid pressure">
    <circle class="marker t-marker" cx="300" cy="430" r="18"/>
    <text class="marker-number" x="300" y="436">2</text>
    <line class="leader" x1="300" y1="430" x2="235" y2="473"/>
    <rect class="label-box" x="235" y="455" width="190" height="54" rx="8"/>
    <text class="player-role" x="247" y="476">2 · Mid pressure</text>
    <text class="player-action" x="247" y="496">Top Mid → Donut</text>
  </g><g data-side="t" data-player="3" data-role="B Lobby entry" data-action="B Lobby → Ramp" aria-label="Player 3, B Lobby entry">
    <circle class="marker t-marker" cx="170" cy="590" r="18"/>
    <text class="marker-number" x="170" y="596">3</text>
    <line class="leader" x1="170" y1="590" x2="45" y2="638"/>
    <rect class="label-box" x="45" y="620" width="190" height="54" rx="8"/>
    <text class="player-role" x="57" y="641">3 · B Lobby entry</text>
    <text class="player-action" x="57" y="661">B Lobby → Ramp</text>
  </g><g data-side="t" data-player="4" data-role="Support / flash" data-action="follow the first contact" aria-label="Player 4, Support / flash">
    <circle class="marker t-marker" cx="260" cy="650" r="18"/>
    <text class="marker-number" x="260" y="656">4</text>
    <line class="leader" x1="260" y1="650" x2="300" y2="688"/>
    <rect class="label-box" x="300" y="670" width="190" height="54" rx="8"/>
    <text class="player-role" x="312" y="691">4 · Support / flash</text>
    <text class="player-action" x="312" y="711">follow the first contact</text>
  </g><g data-side="t" data-player="5" data-role="Bomb / flex" data-action="hold the A or B pivot" aria-label="Player 5, Bomb / flex">
    <circle class="marker t-marker" cx="120" cy="700" r="18"/>
    <text class="marker-number" x="120" y="706">5</text>
    <line class="leader" x1="120" y1="700" x2="45" y2="718"/>
    <rect class="label-box" x="45" y="700" width="190" height="54" rx="8"/>
    <text class="player-role" x="57" y="721">5 · Bomb / flex</text>
    <text class="player-action" x="57" y="741">hold the A or B pivot</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="t-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">T player / route start</text>
    <line class="route t-route" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">route to first pressure</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/ancient · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
