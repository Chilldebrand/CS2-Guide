<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
  <title id="title">Ancient T-side five-player default over the sourced callout map</title>
  <desc id="desc">T Spawn is at the bottom center. Five players leave together, splitting toward A Main, Mid, B Main, Catwalk, and Donut before the first decision.</desc>
  <defs>
    <style>
      .wash{fill:#07111c;fill-opacity:.04}.panel{fill:#07111c;fill-opacity:.84;stroke:#e2e8f0;stroke-opacity:.64;stroke-width:2}.title{fill:#fff;font:700 22px Arial,sans-serif;letter-spacing:.5px}.rule{fill:#e2e8f0;font:13px Arial,sans-serif}.marker{fill:#dc2626;stroke:#fff;stroke-width:3}.number{fill:#fff;font:700 14px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke:#fecaca;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.leader{stroke:#fff;stroke-width:2;stroke-opacity:.82}.label{fill:#07111c;fill-opacity:.88;stroke:#fff;stroke-opacity:.62;stroke-width:1.5}.role{fill:#fff;font:700 14px Arial,sans-serif}.action{fill:#cbd5e1;font:12px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.15;stroke:#fde68a;stroke-width:3;stroke-dasharray:9 7}.zone-text{fill:#fff7b2;font:700 13px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:4px}.legend{fill:#07111c;fill-opacity:.76;stroke:#e2e8f0;stroke-opacity:.5;stroke-width:1.5}.legend-text{fill:#fff;font:12px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fecaca"/></marker>
  </defs>
  <image href="ancient-callouts.png" x="0" y="0" width="1000" height="1000" preserveAspectRatio="none"/>
  <rect class="wash" x="0" y="0" width="1000" height="1000"/>

  <rect class="panel" x="22" y="108" width="420" height="66" rx="12"/>
  <text class="title" x="40" y="136">Ancient - T DEFAULT</text>
  <text class="rule" x="40" y="158">Routes split from T Spawn bottom-center.</text>
  <rect class="legend" x="680" y="20" width="296" height="66" rx="12"/>
  <text class="legend-text" x="698" y="47">Red dot = player start</text>
  <text class="legend-text" x="698" y="66">Pink arrow = first route / decision</text>

  <ellipse class="zone" cx="497" cy="515" rx="68" ry="42"/>
  <text class="zone-text" x="454" y="466">MID / DONUT</text>
  <ellipse class="zone" cx="820" cy="505" rx="70" ry="44"/>
  <text class="zone-text" x="785" y="455">B RAMP</text>
  <ellipse class="zone" cx="220" cy="405" rx="63" ry="42"/>
  <text class="zone-text" x="172" y="357">A MAIN</text>

  <path class="route" d="M 484 900 C 470 805, 440 700, 397 575 C 350 500, 285 430, 220 405"/>
  <path class="route" d="M 500 900 C 500 800, 500 680, 500 570 C 500 545, 500 525, 500 505"/>
  <path class="route" d="M 516 900 C 585 810, 670 710, 755 620 C 790 585, 815 540, 820 505"/>
  <path class="route" d="M 535 900 C 585 820, 625 730, 625 610 C 625 585, 620 570, 620 550"/>
  <path class="route" d="M 468 900 C 455 805, 445 720, 420 640 C 395 585, 350 510, 315 440"/>

  <g data-side="t" data-player="1" data-role="A Main entry" data-action="A Main -> A site" aria-label="Player 1, A Main entry">
    <circle class="marker" cx="484" cy="900" r="17"/><text class="number" x="484" y="905">1</text>
    <line class="leader" x1="484" y1="900" x2="62" y2="405"/><rect class="label" x="22" y="368" width="205" height="54" rx="8"/>
    <text class="role" x="34" y="390">1 - A Main entry</text><text class="action" x="34" y="409">A Main -> A site</text>
  </g>
  <g data-side="t" data-player="2" data-role="Mid pressure" data-action="Top Mid -> Donut" aria-label="Player 2, Mid pressure">
    <circle class="marker" cx="500" cy="900" r="17"/><text class="number" x="500" y="905">2</text>
    <line class="leader" x1="500" y1="900" x2="390" y2="540"/><rect class="label" x="330" y="470" width="205" height="54" rx="8"/>
    <text class="role" x="342" y="492">2 - Mid pressure</text><text class="action" x="342" y="511">Top Mid -> Donut</text>
  </g>
  <g data-side="t" data-player="3" data-role="B Main entry" data-action="B Main -> Ramp" aria-label="Player 3, B Main entry">
    <circle class="marker" cx="516" cy="900" r="17"/><text class="number" x="516" y="905">3</text>
    <line class="leader" x1="516" y1="900" x2="755" y2="635"/><rect class="label" x="748" y="635" width="220" height="54" rx="8"/>
    <text class="role" x="760" y="657">3 - B Main entry</text><text class="action" x="760" y="676">B Main -> Ramp</text>
  </g>
  <g data-side="t" data-player="4" data-role="Support / flash" data-action="follow first contact" aria-label="Player 4, Support / flash">
    <circle class="marker" cx="535" cy="900" r="17"/><text class="number" x="535" y="905">4</text>
    <line class="leader" x1="535" y1="900" x2="700" y2="760"/><rect class="label" x="700" y="752" width="220" height="54" rx="8"/>
    <text class="role" x="712" y="774">4 - Support / flash</text><text class="action" x="712" y="793">follow first contact</text>
  </g>
  <g data-side="t" data-player="5" data-role="Bomb / flex" data-action="hold the A or B pivot" aria-label="Player 5, Bomb / flex">
    <circle class="marker" cx="468" cy="900" r="17"/><text class="number" x="468" y="905">5</text>
    <line class="leader" x1="468" y1="900" x2="42" y2="700"/><rect class="label" x="22" y="674" width="220" height="54" rx="8"/>
    <text class="role" x="34" y="696">5 - Bomb / flex</text><text class="action" x="34" y="715">hold the A or B pivot</text>
  </g>
  <text class="legend-text" x="30" y="975">Teaching default: the bomb trails the first contact; regroup if the first lane is denied.</text>
</svg>
