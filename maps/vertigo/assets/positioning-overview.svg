<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Vertigo positioning route teaching diagram</title>
  <desc id="desc">A schematic Vertigo route diagram separating lower approaches from upper site routes, with A Ramp to A Site, B Stairs to B Site, Mid and Connector pressure, and confirmed defender rotations. Route relationships are verified against the cited overview; shapes are not to scale.</desc>
  <defs>
    <style>.bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.floor{fill:#1f2937;stroke:#475569;stroke-width:2}.route{fill:#374151;stroke:#cbd5e1;stroke-width:2.5}.site{fill:#4b5563;stroke:#e5e7eb;stroke-width:3}.label{fill:#f8fafc;font:700 16px Arial,sans-serif}.small{fill:#cbd5e1;font:15px Arial,sans-serif}.head{fill:#f8fafc;font:700 22px Arial,sans-serif}.ct{fill:#3b82f6;stroke:#dbeafe;stroke-width:3}.t{fill:#ef4444;stroke:#fee2e2;stroke-width:3}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3}.arrow{fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round;marker-end:url(#a)}.transition{fill:none;stroke:#facc15;stroke-width:5;stroke-dasharray:10 8;marker-end:url(#y)}.ctroute{fill:none;stroke:#60a5fa;stroke-width:4;stroke-dasharray:10 8;marker-end:url(#b)}.legend{fill:#f8fafc;font:16px Arial,sans-serif}</style>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fff"/></marker><marker id="y" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#facc15"/></marker><marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#60a5fa"/></marker>
  </defs>
  <rect class="bg" width="1180" height="760"/><rect class="panel" x="36" y="36" width="824" height="688" rx="18"/><rect class="panel" x="884" y="36" width="268" height="688" rx="18"/>
  <text class="head" x="68" y="82">VERTIGO · ROUTE-SENSITIVE SCHEMATIC</text><text class="small" x="68" y="108">Separate floors and verified transitions; teaching layout, not to scale</text>
  <rect class="floor" x="70" y="142" width="754" height="244" rx="16"/><text class="head" x="92" y="178">UPPER / SITE ROUTES</text><rect class="floor" x="70" y="416" width="754" height="270" rx="16"/><text class="head" x="92" y="452">LOWER / APPROACH ROUTES</text>
  <rect class="site" x="596" y="210" width="112" height="78" rx="12"/><text class="label" x="613" y="255">A SITE</text><rect class="site" x="596" y="318" width="112" height="58" rx="12"/><text class="label" x="613" y="353">B SITE</text>
  <rect class="route" x="276" y="510" width="126" height="64" rx="10"/><text class="label" x="302" y="548">A Ramp</text><rect class="route" x="470" y="510" width="108" height="64" rx="10"/><text class="label" x="500" y="548">Mid</text><rect class="route" x="596" y="510" width="126" height="64" rx="10"/><text class="label" x="622" y="548">B Stairs</text><rect class="route" x="458" y="286" width="122" height="64" rx="10"/><text class="label" x="482" y="324">Connector</text><rect class="route" x="92" y="596" width="120" height="64" rx="10"/><text class="label" x="116" y="634">T Spawn</text><rect class="route" x="704" y="180" width="104" height="64" rx="10"/><text class="label" x="730" y="218">CT</text>
  <ellipse class="zone" cx="340" cy="542" rx="92" ry="60"/><path class="arrow" data-edge="t-spawn-to-a-ramp" d="M210 620 C240 594 270 572 294 556"/><path class="transition" data-edge="a-ramp-to-a-site" d="M376 514 C430 416 520 314 590 270"/><path class="arrow" data-edge="t-spawn-to-mid" d="M210 634 C310 630 410 586 472 554"/><path class="arrow" data-edge="mid-to-connector" d="M520 506 C520 446 520 390 520 356"/><path class="transition" data-edge="b-stairs-to-b-site" d="M654 504 C654 454 654 410 654 382"/><path class="ctroute" data-edge="ct-to-a-support" d="M732 222 C706 230 684 238 672 244"/><path class="ctroute" data-edge="ct-to-b-support" d="M754 246 C742 288 714 320 690 336"/>
  <circle class="t" cx="376" cy="542" r="14"/><circle class="t" cx="548" cy="542" r="14"/><circle class="t" cx="700" cy="542" r="14"/><circle class="ct" cx="688" cy="250" r="14"/><circle class="ct" cx="688" cy="348" r="14"/><circle class="ct" cx="580" cy="318" r="14"/>
  <text class="head" x="912" y="84">Teaching read</text><text class="small" x="912" y="118">Ramp is a spacing problem.</text><text class="small" x="912" y="142">Mid/Connector pressure</text><text class="small" x="912" y="166">creates the opposite-floor</text><text class="small" x="912" y="190">rotation decision.</text>
  <text class="head" x="912" y="264">Legend</text><circle class="ct" cx="930" cy="306" r="12"/><text class="legend" x="958" y="312">Defender hold</text><circle class="t" cx="930" cy="350" r="12"/><text class="legend" x="958" y="356">Attacker pressure</text><line class="arrow" x1="916" y1="404" x2="948" y2="404"/><text class="legend" x="958" y="410">Same-floor route</text><line class="transition" x1="916" y1="452" x2="948" y2="452"/><text class="legend" x="958" y="458">Floor transition</text><line class="ctroute" x1="916" y1="500" x2="948" y2="500"/><text class="legend" x="958" y="506">Defender rotation</text>
  <text class="head" x="912" y="566">Round rule</text><text class="small" x="912" y="600">Scale only with a trade.</text><text class="small" x="912" y="624">Rotate on confirmed contact,</text><text class="small" x="912" y="648">not one distant smoke.</text>
</svg>
