  <rect class="layer" x="54" y="116" width="790" height="270" rx="15"/><text class="layerhead" x="76" y="144">SURFACE / UPPER</text><rect class="layer" x="54" y="414" width="790" height="290" rx="15"/><text class="layerhead" x="76" y="442">LOWER</text>
