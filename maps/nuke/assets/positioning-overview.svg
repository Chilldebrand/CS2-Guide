<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Nuke two-layer positioning route teaching diagram</title><desc id="desc">A schematic Nuke diagram separating surface and upper routes from lower routes, showing Outside to Secret, Lobby to upper A, Ramp and Vent transitions, lower Window and Double isolation, CT holds, and vertical movement. Route order is verified against the cited overview; shapes are not to scale.</desc>
  <defs><style>.bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.layer{fill:#1f2937;stroke:#475569;stroke-width:2}.route{fill:#374151;stroke:#cbd5e1;stroke-width:2.3}.site{fill:#4b5563;stroke:#e5e7eb;stroke-width:3}.label{fill:#f8fafc;font:700 15px Arial,sans-serif}.small{fill:#cbd5e1;font:14px Arial,sans-serif}.head{fill:#f8fafc;font:700 21px Arial,sans-serif}.layerhead{fill:#fde68a;font:700 16px Arial,sans-serif}.ct{fill:#3b82f6;stroke:#dbeafe;stroke-width:3}.t{fill:#ef4444;stroke:#fee2e2;stroke-width:3}.zone{fill:#facc15;fill-opacity:.25;stroke:#fde68a;stroke-width:3}.arrow{fill:none;stroke:#fff;stroke-width:4.5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#a)}.vertical{fill:none;stroke:#facc15;stroke-width:4;stroke-dasharray:9 8;marker-end:url(#v)}.link{fill:none;stroke:#64748b;stroke-width:10;stroke-linecap:round}.legend{fill:#f8fafc;font:15px Arial,sans-serif}</style><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fff"/></marker><marker id="v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#facc15"/></marker></defs>
