  <text class="head" x="918" y="72">Teaching read</text><text class="small" x="918" y="106">Outside opens Secret;</text><text class="small" x="918" y="128">Lobby preserves upper A.</text><text class="small" x="918" y="150">Always call the layer when</text><text class="small" x="918" y="172">Secret, Ramp, or Vents move.</text><text class="head" x="918" y="234">Legend</text><circle class="ct" cx="936" cy="274" r="11"/><text class="legend" x="962" y="280">CT hold</text><circle class="t" cx="936" cy="314" r="11"/><text class="legend" x="962" y="320">T pressure</text><rect class="zone" x="924" y="348" width="25" height="20" rx="5"/><text class="legend" x="962" y="364">Decision zone</text><line class="arrow" x1="922" y1="408" x2="952" y2="408"/><text class="legend" x="962" y="414">Trade route</text><line class="vertical" x1="922" y1="456" x2="952" y2="456"/><text class="legend" x="962" y="462">Layer change</text><text class="head" x="918" y="530">Round rule</text><text class="small" x="918" y="564">Do not infer lower from</text><text class="small" x="918" y="586">Outside noise alone. Move</text><text class="small" x="918" y="608">the bomb after verified</text><text class="small" x="918" y="630">vertical information.</text>
