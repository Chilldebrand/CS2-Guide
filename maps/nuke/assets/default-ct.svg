<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Nuke ct default sourced-map overlay</title>
  <desc id="desc">Nuke ct default teaching overlay. Say upper or lower first; hold Outside with cover, keep Ramp supported, and make every vertical rotation explicit. Five players: Upper anchor: hold Hut / A site; Lower anchor: hold B / Decon; Ramp defender: hold Ramp / Double; Outside info: peek with retreat path; Vent rotator: call upper ↔ lower. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#bfdbfe"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Fnuke-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Nuke · CT DEFAULT</text>
  <text class="header-rule" x="48" y="83">Say upper or lower first; hold Outside with cover, keep Ramp supported, and make every vertical rotation explicit.</text>
  <ellipse class="zone" cx="430" cy="260" rx="96" ry="50"/><text class="zone-label" x="325" y="165">Outside info</text><ellipse class="zone" cx="720" cy="500" rx="92" ry="52"/><text class="zone-label" x="620" y="595">Ramp transition</text>
  <path class="hold ct-hold" d="M 920 180 C 860 158, 860 242, 800 220"/><path class="hold ct-hold" d="M 920 560 C 855 538, 855 572, 790 550"/><path class="hold ct-hold" d="M 680 470 C 640 448, 640 472, 600 450"/><path class="hold ct-hold" d="M 430 260 C 390 238, 390 272, 350 250"/><path class="hold ct-hold" d="M 700 630 C 700 608, 700 522, 700 500"/>
  <g data-side="ct" data-player="1" data-role="Upper anchor" data-action="hold Hut / A site" aria-label="Player 1, Upper anchor">
    <circle class="marker ct-marker" cx="920" cy="180" r="18"/>
    <text class="marker-number" x="920" y="186">1</text>
    <line class="leader" x1="920" y1="180" x2="890" y2="143"/>
    <rect class="label-box" x="890" y="125" width="190" height="54" rx="8"/>
    <text class="player-role" x="902" y="146">1 · Upper anchor</text>
    <text class="player-action" x="902" y="166">hold Hut / A site</text>
  </g><g data-side="ct" data-player="2" data-role="Lower anchor" data-action="hold B / Decon" aria-label="Player 2, Lower anchor">
    <circle class="marker ct-marker" cx="920" cy="560" r="18"/>
    <text class="marker-number" x="920" y="566">2</text>
    <line class="leader" x1="920" y1="560" x2="890" y2="638"/>
    <rect class="label-box" x="890" y="620" width="190" height="54" rx="8"/>
    <text class="player-role" x="902" y="641">2 · Lower anchor</text>
    <text class="player-action" x="902" y="661">hold B / Decon</text>
  </g><g data-side="ct" data-player="3" data-role="Ramp defender" data-action="hold Ramp / Double" aria-label="Player 3, Ramp defender">
    <circle class="marker ct-marker" cx="680" cy="470" r="18"/>
    <text class="marker-number" x="680" y="476">3</text>
    <line class="leader" x1="680" y1="470" x2="675" y2="408"/>
    <rect class="label-box" x="675" y="390" width="190" height="54" rx="8"/>
    <text class="player-role" x="687" y="411">3 · Ramp defender</text>
    <text class="player-action" x="687" y="431">hold Ramp / Double</text>
  </g><g data-side="ct" data-player="4" data-role="Outside info" data-action="peek with retreat path" aria-label="Player 4, Outside info">
    <circle class="marker ct-marker" cx="430" cy="260" r="18"/>
    <text class="marker-number" x="430" y="266">4</text>
    <line class="leader" x1="430" y1="260" x2="300" y2="233"/>
    <rect class="label-box" x="300" y="215" width="190" height="54" rx="8"/>
    <text class="player-role" x="312" y="236">4 · Outside info</text>
    <text class="player-action" x="312" y="256">peek with retreat path</text>
  </g><g data-side="ct" data-player="5" data-role="Vent rotator" data-action="call upper ↔ lower" aria-label="Player 5, Vent rotator">
    <circle class="marker ct-marker" cx="700" cy="630" r="18"/>
    <text class="marker-number" x="700" y="636">5</text>
    <line class="leader" x1="700" y1="630" x2="745" y2="708"/>
    <rect class="label-box" x="745" y="690" width="190" height="54" rx="8"/>
    <text class="player-role" x="757" y="711">5 · Vent rotator</text>
    <text class="player-action" x="757" y="731">call upper ↔ lower</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="ct-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">CT player / hold point</text>
    <line class="hold ct-hold" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">angle / lane to hold</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/nuke · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
