<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Nuke t default sourced-map overlay</title>
  <desc id="desc">Nuke t default teaching overlay. Outside pressure and a Ramp/Secret threat force upper and lower defenders to respect different floors before the hit. Five players: Outside pressure: T Spawn → Yard; Secret threat: Yard → Secret / lower; Lobby player: Lobby → Hut / Squeaky; Ramp threat: Ramp → lower; Bomb / flex: join upper or lower read. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#fecaca"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Fnuke-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Nuke · T DEFAULT</text>
  <text class="header-rule" x="48" y="83">Outside pressure and a Ramp/Secret threat force upper and lower defenders to respect different floors before the hit.</text>
  <ellipse class="zone" cx="430" cy="260" rx="96" ry="50"/><text class="zone-label" x="325" y="165">Outside pressure</text><ellipse class="zone" cx="595" cy="470" rx="92" ry="52"/><text class="zone-label" x="490" y="565">Ramp / Secret split</text>
  <path class="route t-route" d="M 160 245 C 295 223, 295 282, 430 260"/><path class="route t-route" d="M 260 320 C 400 298, 400 522, 540 500"/><path class="route t-route" d="M 230 500 C 425 478, 425 322, 620 300"/><path class="route t-route" d="M 250 620 C 425 598, 425 492, 600 470"/><path class="route t-route" d="M 120 700 C 450 678, 450 352, 780 330"/>
  <g data-side="t" data-player="1" data-role="Outside pressure" data-action="T Spawn → Yard" aria-label="Player 1, Outside pressure">
    <circle class="marker t-marker" cx="160" cy="245" r="18"/>
    <text class="marker-number" x="160" y="251">1</text>
    <line class="leader" x1="160" y1="245" x2="45" y2="198"/>
    <rect class="label-box" x="45" y="180" width="190" height="54" rx="8"/>
    <text class="player-role" x="57" y="201">1 · Outside pressure</text>
    <text class="player-action" x="57" y="221">T Spawn → Yard</text>
  </g><g data-side="t" data-player="2" data-role="Secret threat" data-action="Yard → Secret / lower" aria-label="Player 2, Secret threat">
    <circle class="marker t-marker" cx="260" cy="320" r="18"/>
    <text class="marker-number" x="260" y="326">2</text>
    <line class="leader" x1="260" y1="320" x2="210" y2="388"/>
    <rect class="label-box" x="210" y="370" width="190" height="54" rx="8"/>
    <text class="player-role" x="222" y="391">2 · Secret threat</text>
    <text class="player-action" x="222" y="411">Yard → Secret / lower</text>
  </g><g data-side="t" data-player="3" data-role="Lobby player" data-action="Lobby → Hut / Squeaky" aria-label="Player 3, Lobby player">
    <circle class="marker t-marker" cx="230" cy="500" r="18"/>
    <text class="marker-number" x="230" y="506">3</text>
    <line class="leader" x1="230" y1="500" x2="210" y2="568"/>
    <rect class="label-box" x="210" y="550" width="190" height="54" rx="8"/>
    <text class="player-role" x="222" y="571">3 · Lobby player</text>
    <text class="player-action" x="222" y="591">Lobby → Hut / Squeaky</text>
  </g><g data-side="t" data-player="4" data-role="Ramp threat" data-action="Ramp → lower" aria-label="Player 4, Ramp threat">
    <circle class="marker t-marker" cx="250" cy="620" r="18"/>
    <text class="marker-number" x="250" y="626">4</text>
    <line class="leader" x1="250" y1="620" x2="200" y2="708"/>
    <rect class="label-box" x="200" y="690" width="190" height="54" rx="8"/>
    <text class="player-role" x="212" y="711">4 · Ramp threat</text>
    <text class="player-action" x="212" y="731">Ramp → lower</text>
  </g><g data-side="t" data-player="5" data-role="Bomb / flex" data-action="join upper or lower read" aria-label="Player 5, Bomb / flex">
    <circle class="marker t-marker" cx="120" cy="600" r="18"/>
    <text class="marker-number" x="120" y="606">5</text>
    <line class="leader" x1="120" y1="600" x2="35" y2="593"/>
    <rect class="label-box" x="35" y="575" width="190" height="54" rx="8"/>
    <text class="player-role" x="47" y="596">5 · Bomb / flex</text>
    <text class="player-action" x="47" y="616">join upper or lower read</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="t-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">T player / route start</text>
    <line class="route t-route" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">route to first pressure</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/nuke · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
