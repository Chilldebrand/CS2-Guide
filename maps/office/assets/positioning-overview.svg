<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Office hostage-rescue positioning teaching diagram</title>
  <desc id="desc">A schematic Office objective diagram showing separate attacker approaches through Main Hall and Side Hall, defender room isolation, hostage-room access, and a protected safe-exit route back to the rescue zone. Shapes are not to scale.</desc>
  <defs><style>.bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.route{fill:#374151;stroke:#cbd5e1;stroke-width:2.5}.room{fill:#4b5563;stroke:#e5e7eb;stroke-width:3}.label{fill:#f8fafc;font:700 16px Arial,sans-serif}.small{fill:#cbd5e1;font:15px Arial,sans-serif}.head{fill:#f8fafc;font:700 22px Arial,sans-serif}.attacker{fill:#22c55e;stroke:#dcfce7;stroke-width:3}.defender{fill:#f97316;stroke:#ffedd5;stroke-width:3}.hostage{fill:#facc15;stroke:#fef3c7;stroke-width:3}.zone{fill:#facc15;fill-opacity:.18;stroke:#fde68a;stroke-width:3}.access{fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round;marker-end:url(#a)}.rescue{fill:none;stroke:#22d3ee;stroke-width:6;stroke-dasharray:12 8;marker-end:url(#r)}.delay{fill:none;stroke:#f97316;stroke-width:4;stroke-dasharray:9 7;marker-end:url(#d)}.legend{fill:#f8fafc;font:16px Arial,sans-serif}</style><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fff"/></marker><marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#22d3ee"/></marker><marker id="d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#f97316"/></marker></defs>
  <rect class="bg" width="1180" height="760"/><rect class="panel" x="36" y="36" width="824" height="688" rx="18"/><rect class="panel" x="884" y="36" width="268" height="688" rx="18"/><text class="head" x="68" y="82">OFFICE · HOSTAGE-RESCUE SCHEMATIC</text><text class="small" x="68" y="108">Objective routes and decisions; teaching layout, not to scale</text>
  <rect class="route" x="84" y="318" width="168" height="84" rx="12"/><text class="label" x="110" y="350">ATTACKER START</text><text class="small" x="112" y="378">RESCUE ZONE</text><rect class="route" x="310" y="220" width="132" height="68" rx="10"/><text class="label" x="334" y="260">Main Hall</text><rect class="route" x="310" y="446" width="132" height="68" rx="10"/><text class="label" x="338" y="486">Side Hall</text><rect class="route" x="494" y="322" width="126" height="68" rx="10"/><text class="label" x="516" y="362">Room Entry</text><rect class="room" x="672" y="286" width="150" height="132" rx="16"/><text class="label" x="692" y="326">HOSTAGE ROOM</text><circle class="hostage" cx="748" cy="370" r="18"/>
  <ellipse class="zone" cx="554" cy="356" rx="88" ry="66"/><path class="access" data-edge="main-hall-to-room" d="M252 344 C318 306 390 274 482 338"/><path class="access" data-edge="side-hall-to-room" d="M252 378 C332 430 408 472 486 374"/><path class="access" data-edge="entry-to-hostage-room" d="M616 356 C632 354 648 352 664 352"/><path class="rescue" data-edge="hostage-room-safe-exit" d="M700 410 C602 526 448 592 274 412"/><path class="delay" data-edge="defender-return-delay" d="M760 438 C666 500 576 512 508 456"/>
  <circle class="attacker" cx="84" cy="360" r="14"/><circle class="attacker" cx="430" cy="254" r="14"/><circle class="attacker" cx="430" cy="480" r="14"/><circle class="defender" cx="692" cy="292" r="14"/><circle class="defender" cx="794" cy="402" r="14"/><circle class="defender" cx="532" cy="456" r="14"/>
  <text class="head" x="912" y="84">Teaching read</text><text class="small" x="912" y="118">Clear one hall at a time.</text><text class="small" x="912" y="142">Isolate the room, then check</text><text class="small" x="912" y="166">the safe exit before the</text><text class="small" x="912" y="190">carrier moves.</text><text class="head" x="912" y="264">Legend</text><circle class="attacker" cx="930" cy="306" r="12"/><text class="legend" x="958" y="312">Attacker / escort</text><circle class="defender" cx="930" cy="350" r="12"/><text class="legend" x="958" y="356">Defender / delay</text><circle class="hostage" cx="930" cy="398" r="12"/><text class="legend" x="958" y="404">Hostage room</text><line class="access" x1="916" y1="450" x2="948" y2="450"/><text class="legend" x="958" y="456">Access route</text><line class="rescue" x1="916" y1="498" x2="948" y2="498"/><text class="legend" x="958" y="504">Safe exit</text><text class="head" x="912" y="566">Round rule</text><text class="small" x="912" y="600">The carrier is the objective.</text><text class="small" x="912" y="624">Escort the return route;</text><text class="small" x="912" y="648">do not chase side fights.</text>
</svg>
