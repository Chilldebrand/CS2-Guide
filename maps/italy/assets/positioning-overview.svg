<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Italy hostage-rescue positioning teaching diagram</title>
  <desc id="desc">A schematic Italy objective diagram showing separate attacker approaches through Long Alley and Upper Route with Balcony pressure, defender room isolation, hostage-room access, and a protected return lane to the rescue zone. Shapes are not to scale.</desc>
  <defs><style>.bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.route{fill:#374151;stroke:#cbd5e1;stroke-width:2.5}.room{fill:#4b5563;stroke:#e5e7eb;stroke-width:3}.label{fill:#f8fafc;font:700 16px Arial,sans-serif}.small{fill:#cbd5e1;font:15px Arial,sans-serif}.head{fill:#f8fafc;font:700 22px Arial,sans-serif}.attacker{fill:#22c55e;stroke:#dcfce7;stroke-width:3}.defender{fill:#f97316;stroke:#ffedd5;stroke-width:3}.hostage{fill:#facc15;stroke:#fef3c7;stroke-width:3}.zone{fill:#facc15;fill-opacity:.18;stroke:#fde68a;stroke-width:3}.access{fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round;marker-end:url(#a)}.rescue{fill:none;stroke:#22d3ee;stroke-width:6;stroke-dasharray:12 8;marker-end:url(#r)}.delay{fill:none;stroke:#f97316;stroke-width:4;stroke-dasharray:9 7;marker-end:url(#d)}.legend{fill:#f8fafc;font:16px Arial,sans-serif}</style><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fff"/></marker><marker id="r" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#22d3ee"/></marker><marker id="d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#f97316"/></marker></defs>
  <rect class="bg" width="1180" height="760"/><rect class="panel" x="36" y="36" width="824" height="688" rx="18"/><rect class="panel" x="884" y="36" width="268" height="688" rx="18"/><text class="head" x="68" y="82">ITALY · HOSTAGE-RESCUE SCHEMATIC</text><text class="small" x="68" y="108">Objective routes and decisions; teaching layout, not to scale</text>
  <rect class="route" x="84" y="316" width="168" height="84" rx="12"/><text class="label" x="110" y="348">ATTACKER START</text><text class="small" x="112" y="376">RESCUE ZONE</text><rect class="route" x="306" y="464" width="138" height="68" rx="10"/><text class="label" x="328" y="504">Long Alley</text><rect class="route" x="306" y="206" width="138" height="68" rx="10"/><text class="label" x="326" y="246">Upper Route</text><rect class="route" x="492" y="192" width="120" height="68" rx="10"/><text class="label" x="516" y="232">Balcony</text><rect class="route" x="496" y="334" width="126" height="68" rx="10"/><text class="label" x="518" y="374">Room Entry</text><rect class="room" x="674" y="300" width="148" height="132" rx="16"/><text class="label" x="694" y="340">HOSTAGE ROOM</text><circle class="hostage" cx="748" cy="386" r="18"/>
  <ellipse class="zone" cx="558" cy="368" rx="88" ry="66"/><path class="access" data-edge="long-alley-to-room" d="M252 380 C326 446 406 520 488 388"/><path class="access" data-edge="upper-route-to-balcony" d="M252 338 C320 274 398 228 484 226"/><path class="access" data-edge="balcony-to-room" d="M580 258 C616 282 640 314 666 344"/><path class="access" data-edge="entry-to-hostage-room" d="M620 368 C638 366 650 364 666 364"/><path class="rescue" data-edge="hostage-room-return-lane" d="M704 426 C624 552 444 606 274 414"/><path class="delay" data-edge="defender-balcony-delay" d="M744 288 C690 246 638 226 614 226"/>
  <circle class="attacker" cx="84" cy="358" r="14"/><circle class="attacker" cx="436" cy="498" r="14"/><circle class="attacker" cx="440" cy="240" r="14"/><circle class="defender" cx="694" cy="310" r="14"/><circle class="defender" cx="794" cy="414" r="14"/><circle class="defender" cx="606" cy="226" r="14"/>
  <text class="head" x="912" y="84">Teaching read</text><text class="small" x="912" y="118">Long and Upper remain</text><text class="small" x="912" y="142">separate room approaches.</text><text class="small" x="912" y="166">Clear Balcony and the return</text><text class="small" x="912" y="190">lane before moving.</text><text class="head" x="912" y="264">Legend</text><circle class="attacker" cx="930" cy="306" r="12"/><text class="legend" x="958" y="312">Attacker / escort</text><circle class="defender" cx="930" cy="350" r="12"/><text class="legend" x="958" y="356">Defender / delay</text><circle class="hostage" cx="930" cy="398" r="12"/><text class="legend" x="958" y="404">Hostage room</text><line class="access" x1="916" y1="450" x2="948" y2="450"/><text class="legend" x="958" y="456">Access route</text><line class="rescue" x1="916" y1="498" x2="948" y2="498"/><text class="legend" x="958" y="504">Safe exit</text><text class="head" x="912" y="566">Round rule</text><text class="small" x="912" y="600">Send one rifle ahead.</text><text class="small" x="912" y="624">Keep the second escort</text><text class="small" x="912" y="648">close to the carrier.</text>
</svg>
