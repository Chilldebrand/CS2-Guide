<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Inferno ct default sourced-map overlay</title>
  <desc id="desc">Inferno ct default teaching overlay. Layer Banana, anchor A, and keep a Mid rotator disciplined until Banana or A-side space is confirmed. Five players: B anchor: hold Banana / Car; B support: second Banana layer; Mid rotator: watch Mid / Arch; A anchor: hold A Short / site; A support: protect Arch / Library. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#bfdbfe"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Finferno-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Inferno · CT DEFAULT</text>
  <text class="header-rule" x="48" y="83">Layer Banana, anchor A, and keep a Mid rotator disciplined until Banana or A-side space is confirmed.</text>
  <ellipse class="zone" cx="445" cy="285" rx="88" ry="50"/><text class="zone-label" x="335" y="200">Banana hold</text><ellipse class="zone" cx="710" cy="430" rx="96" ry="54"/><text class="zone-label" x="610" y="525">A rotate tax</text>
  <path class="hold ct-hold" d="M 445 285 C 427.5 263, 427.5 257, 410 235"/><path class="hold ct-hold" d="M 525 165 C 497.5 143, 497.5 307, 470 285"/><path class="hold ct-hold" d="M 650 285 C 635 263, 635 387, 620 365"/><path class="hold ct-hold" d="M 790 520 C 750 498, 750 452, 710 430"/><path class="hold ct-hold" d="M 650 610 C 675 588, 675 467, 700 445"/>
  <g data-side="ct" data-player="1" data-role="B anchor" data-action="hold Banana / Car" aria-label="Player 1, B anchor">
    <circle class="marker ct-marker" cx="445" cy="285" r="18"/>
    <text class="marker-number" x="445" y="291">1</text>
    <line class="leader" x1="445" y1="285" x2="245" y2="248"/>
    <rect class="label-box" x="245" y="230" width="190" height="54" rx="8"/>
    <text class="player-role" x="257" y="251">1 · B anchor</text>
    <text class="player-action" x="257" y="271">hold Banana / Car</text>
  </g><g data-side="ct" data-player="2" data-role="B support" data-action="second Banana layer" aria-label="Player 2, B support">
    <circle class="marker ct-marker" cx="525" cy="165" r="18"/>
    <text class="marker-number" x="525" y="171">2</text>
    <line class="leader" x1="525" y1="165" x2="530" y2="128"/>
    <rect class="label-box" x="530" y="110" width="190" height="54" rx="8"/>
    <text class="player-role" x="542" y="131">2 · B support</text>
    <text class="player-action" x="542" y="151">second Banana layer</text>
  </g><g data-side="ct" data-player="3" data-role="Mid rotator" data-action="watch Mid / Arch" aria-label="Player 3, Mid rotator">
    <circle class="marker ct-marker" cx="650" cy="285" r="18"/>
    <text class="marker-number" x="650" y="291">3</text>
    <line class="leader" x1="650" y1="285" x2="690" y2="253"/>
    <rect class="label-box" x="690" y="235" width="190" height="54" rx="8"/>
    <text class="player-role" x="702" y="256">3 · Mid rotator</text>
    <text class="player-action" x="702" y="276">watch Mid / Arch</text>
  </g><g data-side="ct" data-player="4" data-role="A anchor" data-action="hold A Short / site" aria-label="Player 4, A anchor">
    <circle class="marker ct-marker" cx="790" cy="520" r="18"/>
    <text class="marker-number" x="790" y="526">4</text>
    <line class="leader" x1="790" y1="520" x2="760" y2="603"/>
    <rect class="label-box" x="760" y="585" width="190" height="54" rx="8"/>
    <text class="player-role" x="772" y="606">4 · A anchor</text>
    <text class="player-action" x="772" y="626">hold A Short / site</text>
  </g><g data-side="ct" data-player="5" data-role="A support" data-action="protect Arch / Library" aria-label="Player 5, A support">
    <circle class="marker ct-marker" cx="650" cy="610" r="18"/>
    <text class="marker-number" x="650" y="616">5</text>
    <line class="leader" x1="650" y1="610" x2="520" y2="668"/>
    <rect class="label-box" x="520" y="650" width="190" height="54" rx="8"/>
    <text class="player-role" x="532" y="671">5 · A support</text>
    <text class="player-action" x="532" y="691">protect Arch / Library</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="ct-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">CT player / hold point</text>
    <line class="hold ct-hold" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">angle / lane to hold</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/inferno · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
