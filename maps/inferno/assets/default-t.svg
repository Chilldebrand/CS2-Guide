<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Inferno t default sourced-map overlay</title>
  <desc id="desc">Inferno t default teaching overlay. Two players make Banana costly while A-side pressure keeps the defense honest; the flex player carries the pivot. Five players: Banana entry: Logs → Banana; Banana support: trade the first fight; Brackets pressure: Brackets → A Short; Apartments: Apps → A split; Bomb / flex: pivot to the weaker lane. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#fecaca"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Finferno-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Inferno · T DEFAULT</text>
  <text class="header-rule" x="48" y="83">Two players make Banana costly while A-side pressure keeps the defense honest; the flex player carries the pivot.</text>
  <ellipse class="zone" cx="445" cy="285" rx="88" ry="50"/><text class="zone-label" x="335" y="200">Banana pressure</text><ellipse class="zone" cx="710" cy="430" rx="96" ry="54"/><text class="zone-label" x="610" y="525">A-side pressure</text>
  <path class="route t-route" d="M 360 405 C 402.5 383, 402.5 307, 445 285"/><path class="route t-route" d="M 420 515 C 445 493, 445 352, 470 330"/><path class="route t-route" d="M 380 610 C 515 588, 515 452, 650 430"/><path class="route t-route" d="M 300 690 C 510 668, 510 452, 720 430"/><path class="route t-route" d="M 130 690 C 365 668, 365 522, 600 500"/>
  <g data-side="t" data-player="1" data-role="Banana entry" data-action="Logs → Banana" aria-label="Player 1, Banana entry">
    <circle class="marker t-marker" cx="360" cy="405" r="18"/>
    <text class="marker-number" x="360" y="411">1</text>
    <line class="leader" x1="360" y1="405" x2="245" y2="388"/>
    <rect class="label-box" x="245" y="370" width="190" height="54" rx="8"/>
    <text class="player-role" x="257" y="391">1 · Banana entry</text>
    <text class="player-action" x="257" y="411">Logs → Banana</text>
  </g><g data-side="t" data-player="2" data-role="Banana support" data-action="trade the first fight" aria-label="Player 2, Banana support">
    <circle class="marker t-marker" cx="420" cy="515" r="18"/>
    <text class="marker-number" x="420" y="521">2</text>
    <line class="leader" x1="420" y1="515" x2="300" y2="558"/>
    <rect class="label-box" x="300" y="540" width="190" height="54" rx="8"/>
    <text class="player-role" x="312" y="561">2 · Banana support</text>
    <text class="player-action" x="312" y="581">trade the first fight</text>
  </g><g data-side="t" data-player="3" data-role="Brackets pressure" data-action="Brackets → A Short" aria-label="Player 3, Brackets pressure">
    <circle class="marker t-marker" cx="380" cy="610" r="18"/>
    <text class="marker-number" x="380" y="616">3</text>
    <line class="leader" x1="380" y1="610" x2="210" y2="638"/>
    <rect class="label-box" x="210" y="620" width="190" height="54" rx="8"/>
    <text class="player-role" x="222" y="641">3 · Brackets pressure</text>
    <text class="player-action" x="222" y="661">Brackets → A Short</text>
  </g><g data-side="t" data-player="4" data-role="Apartments" data-action="Apps → A split" aria-label="Player 4, Apartments">
    <circle class="marker t-marker" cx="300" cy="690" r="18"/>
    <text class="marker-number" x="300" y="696">4</text>
    <line class="leader" x1="300" y1="690" x2="120" y2="708"/>
    <rect class="label-box" x="120" y="690" width="190" height="54" rx="8"/>
    <text class="player-role" x="132" y="711">4 · Apartments</text>
    <text class="player-action" x="132" y="731">Apps → A split</text>
  </g><g data-side="t" data-player="5" data-role="Bomb / flex" data-action="pivot to the weaker lane" aria-label="Player 5, Bomb / flex">
    <circle class="marker t-marker" cx="130" cy="600" r="18"/>
    <text class="marker-number" x="130" y="606">5</text>
    <line class="leader" x1="130" y1="600" x2="35" y2="593"/>
    <rect class="label-box" x="35" y="575" width="190" height="54" rx="8"/>
    <text class="player-role" x="47" y="596">5 · Bomb / flex</text>
    <text class="player-action" x="47" y="616">pivot to the weaker lane</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="t-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">T player / route start</text>
    <line class="route t-route" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">route to first pressure</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/inferno · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
