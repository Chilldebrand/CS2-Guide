<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Anubis ct default sourced-map overlay</title>
  <desc id="desc">Anubis ct default teaching overlay. Contest Mid with a retreat plan, keep B alive through Water/Canal information, and stagger the first fights. Five players: A anchor: hold A Main / Heaven; B anchor: hold B Main / Temple; Mid info: contest Connector safely; Water hold: watch Canal / Water; Rotator: move through CT after call. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#bfdbfe"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Fanubis-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Anubis · CT DEFAULT</text>
  <text class="header-rule" x="48" y="83">Contest Mid with a retreat plan, keep B alive through Water/Canal information, and stagger the first fights.</text>
  <ellipse class="zone" cx="520" cy="360" rx="96" ry="52"/><text class="zone-label" x="410" y="270">Mid information</text><ellipse class="zone" cx="800" cy="520" rx="86" ry="48"/><text class="zone-label" x="700" y="610">Water / Canal hold</text>
  <path class="hold ct-hold" d="M 940 190 C 880 168, 880 237, 820 215"/><path class="hold ct-hold" d="M 940 555 C 870 533, 870 562, 800 540"/><path class="hold ct-hold" d="M 520 360 C 485 338, 485 362, 450 340"/><path class="hold ct-hold" d="M 800 500 C 760 478, 760 552, 720 530"/><path class="hold ct-hold" d="M 690 640 C 725 618, 725 472, 760 450"/>
  <g data-side="ct" data-player="1" data-role="A anchor" data-action="hold A Main / Heaven" aria-label="Player 1, A anchor">
    <circle class="marker ct-marker" cx="940" cy="190" r="18"/>
    <text class="marker-number" x="940" y="196">1</text>
    <line class="leader" x1="940" y1="190" x2="900" y2="153"/>
    <rect class="label-box" x="900" y="135" width="190" height="54" rx="8"/>
    <text class="player-role" x="912" y="156">1 · A anchor</text>
    <text class="player-action" x="912" y="176">hold A Main / Heaven</text>
  </g><g data-side="ct" data-player="2" data-role="B anchor" data-action="hold B Main / Temple" aria-label="Player 2, B anchor">
    <circle class="marker ct-marker" cx="940" cy="555" r="18"/>
    <text class="marker-number" x="940" y="561">2</text>
    <line class="leader" x1="940" y1="555" x2="900" y2="633"/>
    <rect class="label-box" x="900" y="615" width="190" height="54" rx="8"/>
    <text class="player-role" x="912" y="636">2 · B anchor</text>
    <text class="player-action" x="912" y="656">hold B Main / Temple</text>
  </g><g data-side="ct" data-player="3" data-role="Mid info" data-action="contest Connector safely" aria-label="Player 3, Mid info">
    <circle class="marker ct-marker" cx="520" cy="360" r="18"/>
    <text class="marker-number" x="520" y="366">3</text>
    <line class="leader" x1="520" y1="360" x2="390" y2="273"/>
    <rect class="label-box" x="390" y="255" width="190" height="54" rx="8"/>
    <text class="player-role" x="402" y="276">3 · Mid info</text>
    <text class="player-action" x="402" y="296">contest Connector safely</text>
  </g><g data-side="ct" data-player="4" data-role="Water hold" data-action="watch Canal / Water" aria-label="Player 4, Water hold">
    <circle class="marker ct-marker" cx="800" cy="500" r="18"/>
    <text class="marker-number" x="800" y="506">4</text>
    <line class="leader" x1="800" y1="500" x2="760" y2="473"/>
    <rect class="label-box" x="760" y="455" width="190" height="54" rx="8"/>
    <text class="player-role" x="772" y="476">4 · Water hold</text>
    <text class="player-action" x="772" y="496">watch Canal / Water</text>
  </g><g data-side="ct" data-player="5" data-role="Rotator" data-action="move through CT after call" aria-label="Player 5, Rotator">
    <circle class="marker ct-marker" cx="690" cy="640" r="18"/>
    <text class="marker-number" x="690" y="646">5</text>
    <line class="leader" x1="690" y1="640" x2="650" y2="708"/>
    <rect class="label-box" x="650" y="690" width="190" height="54" rx="8"/>
    <text class="player-role" x="662" y="711">5 · Rotator</text>
    <text class="player-action" x="662" y="731">move through CT after call</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="ct-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">CT player / hold point</text>
    <line class="hold ct-hold" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">angle / lane to hold</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/anubis · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
