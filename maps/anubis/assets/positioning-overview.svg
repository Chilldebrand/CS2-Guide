<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Anubis positioning route teaching diagram</title><desc id="desc">A schematic Anubis route diagram showing Mid and Connector pressure, Canal and Water access, direct A Main and B Main entries, Temple isolation, CT site anchors, and trade paths. Route order is verified against the cited overview; shapes are not to scale.</desc>
  <defs><style>.bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.route{fill:#374151;stroke:#cbd5e1;stroke-width:2.5}.site{fill:#4b5563;stroke:#e5e7eb;stroke-width:3}.label{fill:#f8fafc;font:700 16px Arial,sans-serif}.small{fill:#cbd5e1;font:15px Arial,sans-serif}.head{fill:#f8fafc;font:700 22px Arial,sans-serif}.ct{fill:#3b82f6;stroke:#dbeafe;stroke-width:3}.t{fill:#ef4444;stroke:#fee2e2;stroke-width:3}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3}.arrow{fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#a)}.link{fill:none;stroke:#64748b;stroke-width:12;stroke-linecap:round}.legend{fill:#f8fafc;font:16px Arial,sans-serif}</style><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fff"/></marker></defs>
  <rect class="bg" width="1180" height="760"/><rect class="panel" x="36" y="36" width="824" height="688" rx="18"/><rect class="panel" x="884" y="36" width="268" height="688" rx="18"/><text class="head" x="68" y="82">ANUBIS · ROUTE SCHEMATIC</text><text class="small" x="68" y="108">Verified route order; teaching layout, not to scale</text>
  <path class="link" d="M150 630 300 518 478 394 650 210"/><path class="link" d="M150 630 230 330 650 210"/><path class="link" d="M150 630 390 638 570 550 760 450"/><path class="link" d="M300 518 410 448 570 550"/><path class="link" d="M478 394 690 310 760 450"/><path class="link" d="M650 210 790 190 760 450"/>
  <rect class="route" x="92" y="598" width="124" height="64" rx="10"/><rect class="route" x="242" y="486" width="116" height="64" rx="10"/><rect class="route" x="420" y="362" width="122" height="64" rx="10"/><rect class="route" x="176" y="298" width="112" height="64" rx="10"/><rect class="site" x="598" y="174" width="110" height="72" rx="12"/><rect class="route" x="338" y="606" width="116" height="64" rx="10"/><rect class="route" x="516" y="518" width="112" height="64" rx="10"/><rect class="route" x="354" y="416" width="116" height="64" rx="10"/><rect class="site" x="706" y="414" width="110" height="72" rx="12"/><rect class="route" x="640" y="278" width="114" height="64" rx="10"/><rect class="route" x="734" y="158" width="118" height="64" rx="10"/>
  <ellipse class="zone" cx="302" cy="518" rx="82" ry="54"/><ellipse class="zone" cx="480" cy="394" rx="82" ry="52"/><ellipse class="zone" cx="572" cy="550" rx="78" ry="52"/><path class="arrow" d="M178 610 C204 574 220 532 234 506"/><path class="arrow" d="M330 500 C358 462 386 434 410 414"/><path class="arrow" d="M504 374 C536 322 566 262 588 226"/><path class="arrow" d="M180 620 C290 660 414 630 506 568"/><path class="arrow" d="M604 534 C638 506 670 480 696 464"/><path class="arrow" d="M184 594 C194 500 204 414 220 370"/>
  <circle class="t" cx="340" cy="518" r="14"/><circle class="t" cx="524" cy="394" r="14"/><circle class="t" cx="438" cy="638" r="14"/><circle class="ct" cx="690" cy="210" r="14"/><circle class="ct" cx="798" cy="450" r="14"/><circle class="ct" cx="738" cy="310" r="14"/><circle class="ct" cx="838" cy="190" r="14"/>
  <text class="label" x="118" y="636">T Spawn</text><text class="label" x="278" y="524">Mid</text><text class="label" x="438" y="400">Connector</text><text class="label" x="198" y="336">A Main</text><text class="label" x="612" y="216">A SITE</text><text class="label" x="360" y="644">B Main</text><text class="label" x="540" y="556">Water</text><text class="label" x="378" y="454">Canal</text><text class="label" x="720" y="456">B SITE</text><text class="label" x="662" y="316">Temple</text><text class="label" x="752" y="196">CT Spawn</text>
  <text class="head" x="912" y="84">Teaching read</text><text class="small" x="912" y="118">Mid and Connector create</text><text class="small" x="912" y="142">the split decision. Canal</text><text class="small" x="912" y="166">and Water join B pressure;</text><text class="small" x="912" y="190">Temple stays a CT route.</text><text class="head" x="912" y="264">Legend</text><circle class="ct" cx="930" cy="306" r="12"/><text class="legend" x="958" y="312">CT hold / support</text><circle class="t" cx="930" cy="350" r="12"/><text class="legend" x="958" y="356">T pressure point</text><rect class="zone" x="916" y="386" width="28" height="22" rx="6"/><text class="legend" x="958" y="403">Decision zone</text><line class="arrow" x1="916" y1="446" x2="948" y2="446"/><text class="legend" x="958" y="452">Trade / rotation</text><text class="head" x="912" y="526">Round rule</text><text class="small" x="912" y="560">Do not force Connector or</text><text class="small" x="912" y="584">Water alone. Convert the</text><text class="small" x="912" y="608">first verified route with a</text><text class="small" x="912" y="632">trade pair and the bomb.</text>
</svg>
