<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Train positioning route teaching diagram</title>
  <desc id="desc">A schematic Train route diagram showing separate A Main, Ivy, and Popdog approaches to the outside site, separate Upper and Lower entries to the inner site, Yard pressure, and a defensive Connector rotation. Route relationships are verified against the cited overview; shapes are not to scale.</desc>
  <defs>
    <style>.bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.route{fill:#374151;stroke:#cbd5e1;stroke-width:2.5}.site{fill:#4b5563;stroke:#e5e7eb;stroke-width:3}.label{fill:#f8fafc;font:700 16px Arial,sans-serif}.small{fill:#cbd5e1;font:15px Arial,sans-serif}.head{fill:#f8fafc;font:700 22px Arial,sans-serif}.ct{fill:#3b82f6;stroke:#dbeafe;stroke-width:3}.t{fill:#ef4444;stroke:#fee2e2;stroke-width:3}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3}.arrow{fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round;marker-end:url(#a)}.ctroute{fill:none;stroke:#60a5fa;stroke-width:4;stroke-dasharray:10 8;marker-end:url(#b)}.link{fill:none;stroke:#64748b;stroke-width:12;stroke-linecap:round}.legend{fill:#f8fafc;font:16px Arial,sans-serif}</style>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fff"/></marker>
    <marker id="b" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#60a5fa"/></marker>
  </defs>
  <rect class="bg" width="1180" height="760"/><rect class="panel" x="36" y="36" width="824" height="688" rx="18"/><rect class="panel" x="884" y="36" width="268" height="688" rx="18"/>
  <text class="head" x="68" y="82">TRAIN · ROUTE SCHEMATIC</text><text class="small" x="68" y="108">Verified route order; teaching layout, not to scale</text>
  <path class="link" d="M144 630 300 470 574 286"/><path class="link" d="M144 630 290 610 574 286"/><path class="link" d="M144 630 330 344 574 286"/><path class="link" d="M144 630 430 600 670 548"/><path class="link" d="M144 630 430 478 670 548"/><path class="link" d="M574 286 748 392 670 548"/>
  <path class="arrow" data-edge="a-main-to-a-site" d="M188 598 C270 528 370 420 526 306"/><path class="arrow" data-edge="ivy-to-a-site" d="M314 588 C390 500 470 372 532 316"/><path class="arrow" data-edge="popdog-to-yard" d="M354 356 C416 320 470 300 522 292"/><path class="arrow" data-edge="upper-b-to-b-site" d="M462 486 C530 500 592 520 626 536"/><path class="arrow" data-edge="lower-b-to-b-site" d="M462 598 C528 588 586 568 626 552"/><path class="ctroute" data-edge="connector-rotation" d="M730 402 C716 446 694 490 680 514"/>
  <rect class="route" x="88" y="598" width="120" height="64" rx="10"/><text class="label" x="112" y="636">T Spawn</text>
  <rect class="route" x="234" y="438" width="124" height="64" rx="10"/><text class="label" x="258" y="476">A Main</text>
  <rect class="route" x="234" y="578" width="108" height="64" rx="10"/><text class="label" x="272" y="616">Ivy</text>
  <rect class="route" x="286" y="312" width="122" height="64" rx="10"/><text class="label" x="310" y="350">Popdog</text>
  <ellipse class="zone" cx="490" cy="300" rx="112" ry="72"/><text class="label" x="466" y="306">Yard</text>
  <rect class="site" x="526" y="246" width="112" height="78" rx="12"/><text class="label" x="543" y="291">A SITE</text>
  <rect class="route" x="394" y="446" width="126" height="64" rx="10"/><text class="label" x="420" y="484">Upper B</text>
  <rect class="route" x="394" y="568" width="126" height="64" rx="10"/><text class="label" x="420" y="606">Lower B</text>
  <rect class="site" x="626" y="512" width="112" height="78" rx="12"/><text class="label" x="643" y="557">B SITE</text>
  <rect class="route" x="690" y="360" width="124" height="64" rx="10"/><text class="label" x="708" y="398">Connector</text>
  <circle class="t" cx="326" cy="470" r="14"/><circle class="t" cx="322" cy="610" r="14"/><circle class="t" cx="388" cy="344" r="14"/><circle class="ct" cx="602" cy="286" r="14"/><circle class="ct" cx="704" cy="550" r="14"/><circle class="ct" cx="794" cy="392" r="14"/>
  <text class="head" x="912" y="84">Teaching read</text><text class="small" x="912" y="118">Yard information supports</text><text class="small" x="912" y="142">separate outside routes.</text><text class="small" x="912" y="166">Upper and Lower enter B</text><text class="small" x="912" y="190">without becoming one lane.</text>
  <text class="head" x="912" y="264">Legend</text><circle class="ct" cx="930" cy="306" r="12"/><text class="legend" x="958" y="312">CT hold / support</text><circle class="t" cx="930" cy="350" r="12"/><text class="legend" x="958" y="356">T pressure point</text><rect class="zone" x="916" y="386" width="28" height="22" rx="6"/><text class="legend" x="958" y="403">Yard decision zone</text><line class="arrow" x1="916" y1="446" x2="948" y2="446"/><text class="legend" x="958" y="452">T route</text><line class="ctroute" x1="916" y1="486" x2="948" y2="486"/><text class="legend" x="958" y="492">CT rotation</text>
  <text class="head" x="912" y="552">Round rule</text><text class="small" x="912" y="586">Convert Yard information;</text><text class="small" x="912" y="610">do not split beyond trades.</text><text class="small" x="912" y="646">Reset if the first lane</text><text class="small" x="912" y="670">is denied.</text>
</svg>
