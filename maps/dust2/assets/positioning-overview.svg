<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Dust II positioning route teaching diagram</title><desc id="desc">A schematic Dust II route diagram showing Long into Cross and A, Mid through Xbox and Cat into A, Tunnels into B, CT anchors and rotations, and white trade paths. Route order is verified against the cited overview; shapes are not to scale.</desc>
  <defs><style>.bg{fill:#0f172a}.panel{fill:#111827;stroke:#334155;stroke-width:2}.route{fill:#374151;stroke:#cbd5e1;stroke-width:2.5}.site{fill:#4b5563;stroke:#e5e7eb;stroke-width:3}.label{fill:#f8fafc;font:700 17px Arial,sans-serif}.small{fill:#cbd5e1;font:15px Arial,sans-serif}.head{fill:#f8fafc;font:700 22px Arial,sans-serif}.ct{fill:#3b82f6;stroke:#dbeafe;stroke-width:3}.t{fill:#ef4444;stroke:#fee2e2;stroke-width:3}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3}.arrow{fill:none;stroke:#fff;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#a)}.link{fill:none;stroke:#64748b;stroke-width:12;stroke-linecap:round}.legend{fill:#f8fafc;font:16px Arial,sans-serif}</style><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10z" fill="#fff"/></marker></defs>
  <rect class="bg" width="1180" height="760"/><rect class="panel" x="36" y="36" width="824" height="688" rx="18"/><rect class="panel" x="884" y="36" width="268" height="688" rx="18"/><text class="head" x="68" y="82">DUST II · ROUTE SCHEMATIC</text><text class="small" x="68" y="108">Verified route order; teaching layout, not to scale</text>
  <path class="link" d="M150 625 245 505 260 340 390 180 690 170"/><path class="link" d="M150 625 350 530 455 420 570 315 690 170"/><path class="link" d="M150 625 390 640 590 580 760 505"/><path class="link" d="M455 420 650 430 760 505"/><path class="link" d="M690 170 785 310 760 505"/>
  <rect class="route" x="92" y="592" width="124" height="64" rx="10"/><text class="label" x="118" y="630">T Spawn</text><rect class="route" x="194" y="474" width="108" height="64" rx="10"/><text class="label" x="222" y="512">Long</text><rect class="route" x="222" y="308" width="104" height="64" rx="10"/><text class="label" x="244" y="346">Cross</text><rect class="site" x="638" y="134" width="108" height="72" rx="12"/><text class="label" x="650" y="176">A SITE</text>
  <rect class="route" x="296" y="500" width="106" height="64" rx="10"/><text class="label" x="327" y="538">Mid</text><rect class="route" x="406" y="388" width="104" height="64" rx="10"/><text class="label" x="433" y="426">Xbox</text><rect class="route" x="520" y="282" width="104" height="64" rx="10"/><text class="label" x="542" y="320">Cat</text><rect class="route" x="326" y="608" width="122" height="64" rx="10"/><text class="label" x="352" y="646">Tunnels</text><rect class="site" x="708" y="469" width="108" height="72" rx="12"/><text class="label" x="720" y="511">B SITE</text><rect class="route" x="626" y="278" width="130" height="64" rx="10"/><text class="label" x="646" y="316">CT Spawn</text>
  <ellipse class="zone" cx="274" cy="340" rx="82" ry="54"/><ellipse class="zone" cx="458" cy="420" rx="74" ry="50"/><path class="arrow" d="M170 604 C220 548 242 474 260 362"/><path class="arrow" d="M292 320 C390 244 510 194 626 184"/><path class="arrow" d="M184 616 C286 578 380 504 442 436"/><path class="arrow" d="M478 402 C496 380 506 360 520 340"/><path class="arrow" d="M184 636 C340 674 540 612 696 512"/>
  <circle class="t" cx="286" cy="490" r="14"/><circle class="t" cx="494" cy="436" r="14"/><circle class="t" cx="432" cy="640" r="14"/><circle class="ct" cx="728" cy="184" r="14"/><circle class="ct" cx="800" cy="506" r="14"/><circle class="ct" cx="742" cy="312" r="14"/>
  <text class="label" x="118" y="630">T Spawn</text><text class="label" x="222" y="512">Long</text><text class="label" x="244" y="346">Cross</text><text class="label" x="650" y="176">A SITE</text><text class="label" x="327" y="538">Mid</text><text class="label" x="433" y="426">Xbox</text><text class="label" x="542" y="320">Cat</text><text class="label" x="352" y="646">Tunnels</text><text class="label" x="720" y="511">B SITE</text><text class="label" x="646" y="316">CT Spawn</text>
  <text class="head" x="912" y="84">Teaching read</text><text class="small" x="912" y="118">Long creates the Cross</text><text class="small" x="912" y="142">decision. Xbox unlocks</text><text class="small" x="912" y="166">Cat, while Tunnels keeps</text><text class="small" x="912" y="190">the B anchor honest.</text><text class="head" x="912" y="264">Legend</text><circle class="ct" cx="930" cy="306" r="12"/><text class="legend" x="958" y="312">CT hold / support</text><circle class="t" cx="930" cy="350" r="12"/><text class="legend" x="958" y="356">T pressure point</text><rect class="zone" x="916" y="386" width="28" height="22" rx="6"/><text class="legend" x="958" y="403">Decision zone</text><line class="arrow" x1="916" y1="446" x2="948" y2="446"/><text class="legend" x="958" y="452">Trade / rotation</text><text class="head" x="912" y="526">Round rule</text><text class="small" x="912" y="560">Use verified control to</text><text class="small" x="912" y="584">split a site. Do not cross</text><text class="small" x="912" y="608">or climb alone when the</text><text class="small" x="912" y="632">support utility is late.</text>
</svg>
