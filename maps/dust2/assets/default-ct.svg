<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Dust II ct default sourced-map overlay</title>
  <desc id="desc">Dust II ct default teaching overlay. Either contest Long together or concede it cleanly; keep Mid utility and a B Tunnel listener until a rotation call is real. Five players: Long pair: hold Long / Pit; A anchor: hold Site / Goose; Mid support: deny Xbox / Cat; B anchor: hold Tunnel / Close; Rotator: CT / Short after call. The sourced overview remains the map layer; annotations are editorial and not pixel-perfect.</desc>
  <defs>
    <style>
      .backdrop{fill:#09111f;fill-opacity:.26}.header,.legend{fill:#0b1220;fill-opacity:.9;stroke:#cbd5e1;stroke-opacity:.5;stroke-width:2}.header-title{fill:#fff;font:700 27px Arial,sans-serif;letter-spacing:.8px}.header-rule{fill:#e2e8f0;font:16px Arial,sans-serif}.marker{stroke:#fff;stroke-width:3}.t-marker{fill:#dc2626}.ct-marker{fill:#2563eb}.marker-number{fill:#fff;font:700 17px Arial,sans-serif;text-anchor:middle}.route{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}.t-route{stroke:#fecaca}.hold{fill:none;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}.ct-hold{stroke:#bfdbfe;stroke-dasharray:12 8}.leader{stroke:#f8fafc;stroke-width:2;stroke-opacity:.9}.label-box{fill:#0b1220;fill-opacity:.92;stroke:#f8fafc;stroke-opacity:.7;stroke-width:1.5}.player-role{fill:#fff;font:700 15px Arial,sans-serif}.player-action{fill:#cbd5e1;font:14px Arial,sans-serif}.zone{fill:#facc15;fill-opacity:.28;stroke:#fde68a;stroke-width:3;stroke-dasharray:8 6}.zone-label{fill:#fef3c7;font:700 15px Arial,sans-serif;paint-order:stroke;stroke:#111827;stroke-width:5px;stroke-linejoin:round}.legend-text{fill:#e2e8f0;font:14px Arial,sans-serif}.legend-head{fill:#fff;font:700 15px Arial,sans-serif}.source{fill:#94a3b8;font:13px Arial,sans-serif}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 10 5 0 10z" fill="#bfdbfe"/></marker>
  </defs>
  <image href="https://www.csgold.net/_next/image?q=75&amp;url=%2Fmaps%2Fdust2-callouts.webp&amp;w=3840" x="0" y="0" width="1200" height="760" preserveAspectRatio="xMidYMid slice" opacity=".82"/>
  <rect class="backdrop" x="0" y="0" width="1200" height="760"/>
  <rect class="header" x="24" y="24" width="1152" height="78" rx="14"/>
  <text class="header-title" x="48" y="56">Dust II · CT DEFAULT</text>
  <text class="header-rule" x="48" y="83">Either contest Long together or concede it cleanly; keep Mid utility and a B Tunnel listener until a rotation call is real.</text>
  <ellipse class="zone" cx="830" cy="230" rx="86" ry="46"/><text class="zone-label" x="770" y="150">Long hold</text><ellipse class="zone" cx="780" cy="545" rx="86" ry="48"/><text class="zone-label" x="720" y="625">B anchor</text>
  <path class="hold ct-hold" d="M 920 205 C 867.5 183, 867.5 257, 815 235"/><path class="hold ct-hold" d="M 930 300 C 865 278, 865 282, 800 260"/><path class="hold ct-hold" d="M 680 360 C 627.5 338, 627.5 412, 575 390"/><path class="hold ct-hold" d="M 930 560 C 855 538, 855 572, 780 550"/><path class="hold ct-hold" d="M 780 470 C 715 448, 715 452, 650 430"/>
  <g data-side="ct" data-player="1" data-role="Long pair" data-action="hold Long / Pit" aria-label="Player 1, Long pair">
    <circle class="marker ct-marker" cx="920" cy="205" r="18"/>
    <text class="marker-number" x="920" y="211">1</text>
    <line class="leader" x1="920" y1="205" x2="900" y2="163"/>
    <rect class="label-box" x="900" y="145" width="190" height="54" rx="8"/>
    <text class="player-role" x="912" y="166">1 · Long pair</text>
    <text class="player-action" x="912" y="186">hold Long / Pit</text>
  </g><g data-side="ct" data-player="2" data-role="A anchor" data-action="hold Site / Goose" aria-label="Player 2, A anchor">
    <circle class="marker ct-marker" cx="930" cy="300" r="18"/>
    <text class="marker-number" x="930" y="306">2</text>
    <line class="leader" x1="930" y1="300" x2="920" y2="373"/>
    <rect class="label-box" x="920" y="355" width="190" height="54" rx="8"/>
    <text class="player-role" x="932" y="376">2 · A anchor</text>
    <text class="player-action" x="932" y="396">hold Site / Goose</text>
  </g><g data-side="ct" data-player="3" data-role="Mid support" data-action="deny Xbox / Cat" aria-label="Player 3, Mid support">
    <circle class="marker ct-marker" cx="680" cy="360" r="18"/>
    <text class="marker-number" x="680" y="366">3</text>
    <line class="leader" x1="680" y1="360" x2="650" y2="293"/>
    <rect class="label-box" x="650" y="275" width="190" height="54" rx="8"/>
    <text class="player-role" x="662" y="296">3 · Mid support</text>
    <text class="player-action" x="662" y="316">deny Xbox / Cat</text>
  </g><g data-side="ct" data-player="4" data-role="B anchor" data-action="hold Tunnel / Close" aria-label="Player 4, B anchor">
    <circle class="marker ct-marker" cx="930" cy="560" r="18"/>
    <text class="marker-number" x="930" y="566">4</text>
    <line class="leader" x1="930" y1="560" x2="920" y2="638"/>
    <rect class="label-box" x="920" y="620" width="190" height="54" rx="8"/>
    <text class="player-role" x="932" y="641">4 · B anchor</text>
    <text class="player-action" x="932" y="661">hold Tunnel / Close</text>
  </g><g data-side="ct" data-player="5" data-role="Rotator" data-action="CT / Short after call" aria-label="Player 5, Rotator">
    <circle class="marker ct-marker" cx="780" cy="470" r="18"/>
    <text class="marker-number" x="780" y="476">5</text>
    <line class="leader" x1="780" y1="470" x2="730" y2="423"/>
    <rect class="label-box" x="730" y="405" width="190" height="54" rx="8"/>
    <text class="player-role" x="742" y="426">5 · Rotator</text>
    <text class="player-action" x="742" y="446">CT / Short after call</text>
  </g>
  <g aria-label="legend">
    <rect class="legend" x="24" y="650" width="1152" height="86" rx="14"/>
    <text class="legend-head" x="48" y="678">Legend</text>
    <circle class="ct-marker marker" cx="122" cy="675" r="11"/><text class="legend-text" x="143" y="680">CT player / hold point</text>
    <line class="hold ct-hold" x1="370" y1="675" x2="422" y2="675"/><text class="legend-text" x="440" y="680">angle / lane to hold</text>
    <ellipse class="zone" cx="760" cy="675" rx="22" ry="12"/><text class="legend-text" x="794" y="680">first decision area</text>
    <text class="source" x="48" y="716">Sourced overview: https://www.csgold.net/en/maps/dust2 · local annotations are a teaching overlay, not a replacement radar.</text>
  </g>
</svg>
